<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>翠翠大冒险 - 2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: #87ceeb;
        font-family: 'Microsoft YaHei', sans-serif;
        touch-action: none;
      }

      #gameCanvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #healthBar {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 220px;
        height: 28px;
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }

      #healthFill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ff4444, #ff8844, #ffaa44);
        transition: width 0.3s;
        border-radius: 12px;
      }

      #scoreBoard {
        position: absolute;
        top: 20px;
        right: 20px;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        font-size: 18px;
        text-align: right;
      }

      #levelInfo {
        position: absolute;
        top: 60px;
        left: 20px;
        color: #ffd700;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        font-size: 20px;
        font-weight: bold;
      }

      #weaponInfo {
        position: absolute;
        top: 95px;
        left: 20px;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        font-size: 15px;
        background: linear-gradient(
          135deg,
          rgba(0, 0, 0, 0.6),
          rgba(50, 50, 100, 0.4)
        );
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      #startScreen,
      #gameOverScreen,
      #levelCompleteScreen,
      #victoryScreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        pointer-events: auto;
        z-index: 100;
      }

      #gameOverScreen,
      #levelCompleteScreen,
      #victoryScreen {
        display: none;
      }

      .title {
        font-size: 48px;
        color: #ffd700;
        text-shadow:
          0 0 20px #ff6b6b,
          0 0 40px #ff6b6b;
        margin-bottom: 20px;
        animation: glow 2s ease-in-out infinite;
      }

      @keyframes glow {
        0%,
        100% {
          text-shadow:
            0 0 20px #ff6b6b,
            0 0 40px #ff6b6b;
        }
        50% {
          text-shadow:
            0 0 30px #ffd700,
            0 0 60px #ffd700;
        }
      }

      @keyframes levelUpAnim {
        0% {
          transform: translate(-50%, -50%) scale(0.5);
          opacity: 0;
        }
        20% {
          transform: translate(-50%, -50%) scale(1.2);
          opacity: 1;
        }
        80% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(1.5);
          opacity: 0;
        }
      }

      @keyframes comboAnim {
        0% {
          transform: translate(-50%, -50%) scale(0.5);
          opacity: 0;
        }
        30% {
          transform: translate(-50%, -50%) scale(1.3);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -100%) scale(1);
          opacity: 0;
        }
      }

      .subtitle {
        font-size: 20px;
        color: #fff;
        margin-bottom: 30px;
        text-align: center;
        max-width: 600px;
        line-height: 1.6;
      }

      .btn {
        padding: 15px 40px;
        font-size: 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin: 10px;
      }

      .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(102, 126, 234, 0.6);
      }

      #controls {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        line-height: 1.8;
      }

      /* 移动端控制按钮 */
      #mobileControls {
        position: absolute;
        bottom: 20px;
        width: 100%;
        display: none;
        pointer-events: auto;
        padding: 0 20px;
      }

      .controlRow {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 10px;
      }

      .controlBtn {
        width: 60px;
        height: 60px;
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        color: #fff;
        font-size: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        touch-action: manipulation;
      }

      .controlBtn:active {
        background: rgba(255, 255, 255, 0.4);
      }

      .controlBtn.large {
        width: 80px;
        height: 80px;
        font-size: 32px;
        background: rgba(255, 100, 100, 0.3);
      }

      .controlBtn.attack {
        background: rgba(255, 200, 50, 0.4);
      }

      .dPad {
        display: flex;
        gap: 10px;
      }

      #damageOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          transparent 30%,
          rgba(255, 0, 0, 0.3) 100%
        );
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }

      .enemyLabel {
        position: absolute;
        color: #ff6b6b;
        font-size: 14px;
        font-weight: bold;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        transform: translate(-50%, -100%);
      }

      @media (max-width: 768px) {
        .title {
          font-size: 32px;
        }
        .subtitle {
          font-size: 14px;
          padding: 0 20px;
        }
        #controls {
          display: none;
        }
        #mobileControls {
          display: block;
        }
        #scoreBoard {
          font-size: 14px;
        }
        #levelInfo {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
      <div id="healthBar">
        <div id="healthFill"></div>
      </div>
      <div id="levelInfo">准备开始...</div>
      <div id="weaponInfo">🗡️ 木剑 Lv.1</div>
      <div id="scoreBoard">
        分数: <span id="score">0</span><br />
        击杀: <span id="kills">0</span>
      </div>
      <div id="controls">
        WASD / 方向键: 移动<br />
        空格: 跳跃<br />
        J / 点击: 攻击
      </div>
    </div>

    <div id="mobileControls">
      <div class="controlRow">
        <div class="dPad">
          <div class="controlBtn" id="btnLeft">←</div>
          <div class="controlBtn" id="btnRight">→</div>
        </div>
        <div class="controlBtn large" id="btnJump">↑</div>
        <div class="controlBtn large attack" id="btnAttack">⚔️</div>
      </div>
    </div>

    <div id="damageOverlay"></div>

    <div id="startScreen">
      <h1 class="title">🌿 翠翠草原大冒险</h1>
      <p class="subtitle">
        翠翠获得了一把星光剑！<br />
        击败二叔、二婶、嘉姐、万总等怪物<br />
        升级武器，挑战十关！<br />
        <br />
        ⚔️ 初始武器已有剑气效果！
      </p>
      <button class="btn" onclick="startGame()">开始冒险</button>
    </div>

    <div id="gameOverScreen">
      <h1 class="title">💀 游戏结束</h1>
      <p class="subtitle" id="gameOverText"></p>
      <button class="btn" onclick="restartGame()">重新开始</button>
    </div>

    <div id="levelCompleteScreen">
      <h1 class="title">🎉 关卡完成！</h1>
      <p class="subtitle" id="levelCompleteText"></p>
      <button class="btn" onclick="nextLevel()">下一关</button>
    </div>

    <div id="victoryScreen">
      <h1 class="title">🏆 通关大吉！</h1>
      <p class="subtitle" id="victoryText"></p>
      <button class="btn" onclick="restartGame()">再玩一次</button>
    </div>

      // ==================== 初始化 ====================
      function init() {
        // 场景 - 柔和草原背景
        scene = new THREE.Scene()
        scene.background = new THREE.Color(0x6688aa) // 柔和的灰蓝色天空
        scene.fog = new THREE.Fog(0x7799aa, 30, 100) // 淡雾

        // 相机
        camera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        )
        camera.position.copy(cameraOffset)

        // 渲染器
        renderer = new THREE.WebGLRenderer({
          canvas: document.getElementById('gameCanvas'),
          antialias: true,
        })
        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.shadowMap.enabled = true
        renderer.shadowMap.type = THREE.PCFSoftShadowMap
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))

        // 灯光 - 柔和的草原阳光效果
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5)
        scene.add(ambientLight)

        const dirLight = new THREE.DirectionalLight(0xffffcc, 0.7)
        dirLight.position.set(10, 20, 10)
        dirLight.castShadow = true
        dirLight.shadow.camera.left = -50
        dirLight.shadow.camera.right = 50
        dirLight.shadow.camera.top = 50
        dirLight.shadow.camera.bottom = -50
        dirLight.shadow.mapSize.width = 2048
        dirLight.shadow.mapSize.height = 2048
        scene.add(dirLight)

        // 事件监听
        window.addEventListener('resize', onWindowResize)
        document.addEventListener('keydown', (e) => (keys[e.code] = true))
        document.addEventListener('keyup', (e) => (keys[e.code] = false))
        document.addEventListener('mousedown', onMouseDown)
        document.addEventListener('touchstart', onTouchStart, {
          passive: false,
        })

        // 移动端控制
        setupMobileControls()

        // 开始渲染循环
        animate()
      }

      function setupMobileControls() {
        const btnLeft = document.getElementById('btnLeft')
        const btnRight = document.getElementById('btnRight')
        const btnJump = document.getElementById('btnJump')
        const btnAttack = document.getElementById('btnAttack')

        const addTouch = (btn, code) => {
          btn.addEventListener('touchstart', (e) => {
            e.preventDefault()
            keys[code] = true
          })
          btn.addEventListener('touchend', (e) => {
            e.preventDefault()
            keys[code] = false
          })
          btn.addEventListener('mousedown', () => (keys[code] = true))
          btn.addEventListener('mouseup', () => (keys[code] = false))
        }

        addTouch(btnLeft, 'ArrowLeft')
        addTouch(btnRight, 'ArrowRight')
        addTouch(btnJump, 'Space')
        btnAttack.addEventListener('touchstart', (e) => {
          e.preventDefault()
          attack()
        })
        btnAttack.addEventListener('mousedown', attack)
      }

      // ==================== 创建玩家 ====================
      function createPlayer() {
        const group = new THREE.Group()

        // 头部
        let head

        // 默认球体头部（备用）
        const defaultHeadMat = new THREE.MeshStandardMaterial({
          color: 0xffdd00, // 黄色
        })
        const defaultHeadGeo = new THREE.SphereGeometry(0.5, 16, 16)
        const defaultHead = new THREE.Mesh(defaultHeadGeo, defaultHeadMat)
        defaultHead.position.y = 1.4
        defaultHead.name = 'defaultHead'
        head = defaultHead
        group.add(defaultHead)

        // 头部 - 使用翠翠的2D图片Sprite

      function createSword(level) {
        const config = weaponConfigs[level]
        const group = new THREE.Group()

        // ===== 真实剑的基础结构 =====

        // 剑身 - 更加真实的渐变剑刃
        const bladeLength = 1.2 + level * 0.2
        const bladeGroup = new THREE.Group()

        // 主剑身 - 使用多段渐变效果
        const bladeMainGeo = new THREE.BoxGeometry(
          0.12,
          bladeLength * 0.7,
          0.02,
        )
        const bladeMainMat = new THREE.MeshStandardMaterial({
          color: config.color,
          emissive: config.color,
          emissiveIntensity: config.glow * 0.6,
          metalness: 0.95,
          roughness: 0.05,
        })
        const bladeMain = new THREE.Mesh(bladeMainGeo, bladeMainMat)
        bladeMain.position.y = bladeLength * 0.35 + 0.1
        bladeGroup.add(bladeMain)

        // 剑身前段 - 逐渐变细
        const bladeTipGeo = new THREE.ConeGeometry(0.06, bladeLength * 0.4, 4)
        const bladeTipMat = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          emissive: config.color,
          emissiveIntensity: config.glow,
          metalness: 0.9,
          roughness: 0.1,
        })
        const bladeTip = new THREE.Mesh(bladeTipGeo, bladeTipMat)
        bladeTip.position.y = bladeLength * 0.7 + 0.05
        bladeTip.rotation.z = Math.PI / 2
        bladeGroup.add(bladeTip)

        // 剑脊装饰线
        const ridgeGeo = new THREE.BoxGeometry(0.02, bladeLength * 0.85, 0.01)
        const ridgeMat = new THREE.MeshStandardMaterial({
          color: 0xaaccff,
          emissive: config.color,
          emissiveIntensity: config.glow * 0.3,
          metalness: 1,
          roughness: 0.2,
        })
        const ridge = new THREE.Mesh(ridgeGeo, ridgeMat)
        ridge.position.set(0, bladeLength * 0.42 + 0.1, 0.015)
        bladeGroup.add(ridge)

        // 血槽设计
        const fullerGeo = new THREE.BoxGeometry(0.04, bladeLength * 0.5, 0.025)
        const fullerMat = new THREE.MeshStandardMaterial({
          color: config.color,
          emissive: config.color,
          emissiveIntensity: config.glow * 0.4,
          transparent: true,
          opacity: 0.6,
        })
        const fuller = new THREE.Mesh(fullerGeo, fullerMat)
        fuller.position.set(0, bladeLength * 0.35 + 0.15, -0.005)
        bladeGroup.add(fuller)

        // 剑刃边缘发光
        const edgeGeo = new THREE.EdgesGeometry(
          new THREE.BoxGeometry(0.13, bladeLength * 0.7, 0.03),
        )
        const edgeMat = new THREE.LineBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.8,
        })
        const edgeLine = new THREE.LineSegments(edgeGeo, edgeMat)
        edgeLine.position.y = bladeLength * 0.35 + 0.1
        bladeGroup.add(edgeLine)

        bladeGroup.add(bladeMain, bladeTip, ridge, fuller, edgeLine)

        // 剑身前部发光光晕
        const bladeGlowGeo = new THREE.SphereGeometry(
          0.2 + level * 0.03,
          16,
          16,
        )
        const bladeGlowMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.15,
        })
        const bladeGlow = new THREE.Mesh(bladeGlowGeo, bladeGlowMat)
        bladeGlow.position.y = bladeLength * 0.5 + 0.1
        bladeGlow.scale.set(1, 1.5, 0.5)
        bladeGlow.name = 'bladeGlow'
        bladeGroup.add(bladeGlow)

        group.add(bladeGroup)

        // ===== 十字护手 - 更精细的设计 =====
        const guardGroup = new THREE.Group()

        // 主护手 - 弧形设计
        const guardShape = new THREE.Shape()
        guardShape.moveTo(-0.35, -0.04)
        guardShape.lineTo(-0.3, 0.04)
        guardShape.lineTo(0.3, 0.04)
        guardShape.lineTo(0.35, -0.04)
        guardShape.lineTo(0.3, -0.08)
        guardShape.lineTo(-0.3, -0.08)
        guardShape.closePath()

        const guardGeo = new THREE.ExtrudeGeometry(guardShape, {
          depth: 0.08,
          bevelEnabled: true,
          bevelThickness: 0.02,
          bevelSize: 0.02,
          bevelSegments: 3,
        })
        const guardMat = new THREE.MeshStandardMaterial({
          color: 0xc9a227,
          emissive: config.color,
          emissiveIntensity: config.glow * 0.4,
          metalness: 0.85,
          roughness: 0.2,
        })
        const guard = new THREE.Mesh(guardGeo, guardMat)
        guard.position.set(-0.25, -0.04, -0.04)
        guard.rotation.x = 0
        guardGroup.add(guard)

        // 护手装饰球
        const guardOrbGeo = new THREE.SphereGeometry(0.045, 12, 12)
        const guardOrbMat = new THREE.MeshStandardMaterial({
          color: config.color,
          emissive: config.color,
          emissiveIntensity: config.glow * 0.6,
          metalness: 0.7,
          roughness: 0.3,
        })

        const leftOrb = new THREE.Mesh(guardOrbGeo, guardOrbMat)
        leftOrb.position.set(-0.35, 0, 0)
        guardGroup.add(leftOrb)

        const rightOrb = new THREE.Mesh(guardOrbGeo, guardOrbMat)
        rightOrb.position.set(0.35, 0, 0)
        guardGroup.add(rightOrb)

        // 护手中心宝石
        const centerGemGeo = new THREE.OctahedronGeometry(0.06, 0)
        const centerGemMat = new THREE.MeshStandardMaterial({
          color: config.color,
          emissive: config.color,
          emissiveIntensity: config.glow,
          metalness: 0.5,
          roughness: 0.1,
          transparent: true,
          opacity: 0.9,
        })
        const centerGem = new THREE.Mesh(centerGemGeo, centerGemMat)
        centerGem.position.set(0, 0, 0.06)
        centerGem.name = 'centerGem'
        guardGroup.add(centerGem)

        guardGroup.position.y = -0.05
        group.add(guardGroup)

        // ===== 剑柄 - 缠绕设计 =====
        const handleGroup = new THREE.Group()

        // 柄芯
        const handleCoreGeo = new THREE.CylinderGeometry(0.06, 0.055, 0.55, 12)
        const handleCoreMat = new THREE.MeshStandardMaterial({
          color: 0x3d2817,
          roughness: 0.7,
          metalness: 0.2,
        })
        const handleCore = new THREE.Mesh(handleCoreGeo, handleCoreMat)
        handleGroup.add(handleCore)

        // 缠绕线
        const wrapCount = 8
        for (let i = 0; i < wrapCount; i++) {
          const wrapGeo = new THREE.TorusGeometry(0.065, 0.012, 6, 16)
          const wrapMat = new THREE.MeshStandardMaterial({
            color: 0x2a1a0a,
            roughness: 0.8,
          })
          const wrap = new THREE.Mesh(wrapGeo, wrapMat)
          wrap.position.y = -0.2 + (i * 0.5) / wrapCount
          wrap.rotation.x = Math.PI / 2
          handleGroup.add(wrap)
        }

        // 柄尾
        const pommelGeo = new THREE.SphereGeometry(0.07, 12, 12)
        const pommelMat = new THREE.MeshStandardMaterial({
          color: 0xc9a227,
          emissive: config.color,
          emissiveIntensity: config.glow * 0.3,
          metalness: 0.85,
          roughness: 0.15,
        })
        const pommel = new THREE.Mesh(pommelGeo, pommelMat)
        pommel.position.y = -0.28
        handleGroup.add(pommel)

        // 柄尾装饰
        const pommelGemGeo = new THREE.OctahedronGeometry(0.03, 0)
        const pommelGemMat = new THREE.MeshStandardMaterial({
          color: config.color,
          emissive: config.color,
          emissiveIntensity: config.glow,
        })
        const pommelGem = new THREE.Mesh(pommelGemGeo, pommelGemMat)
        pommelGem.position.y = -0.28
        pommelGem.name = 'pommelGem'
        handleGroup.add(pommelGem)

        handleGroup.position.y = -0.35
        group.add(handleGroup)

        // ===== 剑尖能量特效 =====
        const tipEnergyGeo = new THREE.ConeGeometry(
          0.08 + level * 0.01,
          0.25,
          8,
        )
        const tipEnergyMat = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.6,
        })
        const tipEnergy = new THREE.Mesh(tipEnergyGeo, tipEnergyMat)
        tipEnergy.position.y = bladeLength + 0.3
        tipEnergy.rotation.z = -Math.PI / 2
        tipEnergy.name = 'tipEnergy'
        group.add(tipEnergy)

        // 剑尖光球
        const tipGlowGeo = new THREE.SphereGeometry(0.12 + level * 0.02, 16, 16)
        const tipGlowMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.7,
        })
        const tipGlow = new THREE.Mesh(tipGlowGeo, tipGlowMat)
        tipGlow.position.y = bladeLength + 0.25
        tipGlow.name = 'tipGlow'
        group.add(tipGlow)

        // ===== 波动光环效果 =====
        // 阴影基底
        const shadowGeo = new THREE.CircleGeometry(0.8 + level * 0.1, 32)
        const shadowMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.2,
          side: THREE.DoubleSide,
        })
        const shadow = new THREE.Mesh(shadowGeo, shadowMat)
        shadow.rotation.x = -Math.PI / 2
        shadow.position.y = 0.15
        shadow.name = 'shadow'
        group.add(shadow)

        // 内层光环
        const innerGlowGeo = new THREE.RingGeometry(0.3, 0.6 + level * 0.05, 32)
        const innerGlowMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.35,
          side: THREE.DoubleSide,
        })
        const innerGlow = new THREE.Mesh(innerGlowGeo, innerGlowMat)
        innerGlow.rotation.x = -Math.PI / 2
        innerGlow.position.y = 0.1
        innerGlow.name = 'innerGlow'
        group.add(innerGlow)

        // 外层光环
        const outerGlowGeo = new THREE.RingGeometry(
          0.5 + level * 0.08,
          1.0 + level * 0.1,
          32,
        )
        const outerGlowMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.15,
          side: THREE.DoubleSide,
        })
        const outerGlow = new THREE.Mesh(outerGlowGeo, outerGlowMat)
        outerGlow.rotation.x = -Math.PI / 2
        outerGlow.position.y = 0.05
        outerGlow.name = 'outerGlow'
        group.add(outerGlow)

        // 最外层光环
        const farGlowGeo = new THREE.RingGeometry(
          0.8 + level * 0.12,
          1.3 + level * 0.15,
          32,
        )
        const farGlowMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.08,
          side: THREE.DoubleSide,
        })
        const farGlow = new THREE.Mesh(farGlowGeo, farGlowMat)
        farGlow.rotation.x = -Math.PI / 2
        farGlow.position.y = 0.02
        farGlow.name = 'farGlow'
        group.add(farGlow)

        // 剑身上方能量云
        const waveGeo = new THREE.SphereGeometry(0.35 + level * 0.05, 16, 16)
        const waveMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.12,
        })
        const wave = new THREE.Mesh(waveGeo, waveMat)
        wave.position.y = bladeLength * 0.6 + 0.15
        wave.scale.set(1, 0.5, 0.4)
        wave.name = 'wave'
        group.add(wave)

        // 能量条纹
        for (let i = 0; i < 3; i++) {
          const stripeGeo = new THREE.RingGeometry(
            0.15 + i * 0.12,
            0.2 + i * 0.12,
            32,
          )
          const stripeMat = new THREE.MeshBasicMaterial({
            color: config.color,
            transparent: true,
            opacity: 0.1 - i * 0.025,
            side: THREE.DoubleSide,
          })
          const stripe = new THREE.Mesh(stripeGeo, stripeMat)
          stripe.rotation.x = -Math.PI / 2
          stripe.position.y = 0.4 + i * 0.15
          stripe.name = 'stripe' + i
          group.add(stripe)
        }

        // ===== 特效粒子 =====
        // 剑身周围粒子
        const particleGeo = new THREE.BufferGeometry()
        const particleCount = 20 + level * 5
        const positions = new Float32Array(particleCount * 3)
        for (let i = 0; i < particleCount * 3; i += 3) {
          const angle =
            (i / 3) * ((Math.PI * 2) / particleCount) + Math.random() * 0.3
          const radius = 0.15 + Math.random() * 0.25
          positions[i] = Math.cos(angle) * radius
          positions[i + 1] = Math.random() * (bladeLength + 0.8) + 0.2
          positions[i + 2] = Math.sin(angle) * radius * 0.3
        }
        particleGeo.setAttribute(
          'position',
          new THREE.BufferAttribute(positions, 3),
        )
        const particleMat = new THREE.PointsMaterial({
          color: config.color,
          size: 0.06 + level * 0.01,
          transparent: true,
          opacity: 0.6,
        })
        const particles = new THREE.Points(particleGeo, particleMat)
        particles.name = 'particles'
        group.add(particles)

        // 环绕光环粒子
        const ringParticleGeo = new THREE.BufferGeometry()
        const ringParticleCount = 25 + level * 3
        const ringPositions = new Float32Array(ringParticleCount * 3)
        for (let i = 0; i < ringParticleCount * 3; i += 3) {
          const angle = (i / 3) * ((Math.PI * 2) / ringParticleCount)
          const radius = 0.5 + level * 0.06
          ringPositions[i] = Math.cos(angle) * radius
          ringPositions[i + 1] = 0.25 + Math.random() * 0.25
          ringPositions[i + 2] = Math.sin(angle) * radius
        }
        ringParticleGeo.setAttribute(
          'position',
          new THREE.BufferAttribute(ringPositions, 3),
        )
        const ringParticleMat = new THREE.PointsMaterial({
          color: config.color,
          size: 0.04 + level * 0.006,
          transparent: true,
          opacity: 0.4,
        })
        const ringParticles = new THREE.Points(ringParticleGeo, ringParticleMat)
        ringParticles.name = 'ringParticles'
        group.add(ringParticles)

        // ===== 动态光照 =====
        // 主光源
        const mainLight = new THREE.PointLight(
          config.color,
          config.glow * 0.6,
          6 + level,
        )
        mainLight.position.y = bladeLength * 0.5
        mainLight.name = 'mainLight'
        group.add(mainLight)

        // 剑尖聚光灯
        const tipLight = new THREE.PointLight(0xffffff, config.glow * 0.4, 3)
        tipLight.position.y = bladeLength + 0.3
        group.add(tipLight)

        // 底部阴影光
        const shadowLight = new THREE.PointLight(
          config.color,
          config.glow * 0.2,
          3 + level,
        )
        shadowLight.position.y = 0.08
        group.add(shadowLight)

        return group
      }

      // 剑气波动动画
      function updateSwordWave(time) {
        if (!sword) return
        const config = weaponConfigs[weaponLevel]

        // 更新剑身光晕
        const bladeGlow = sword.getObjectByName('bladeGlow')
        if (bladeGlow) {
          const pulse = 1 + Math.sin(time * 4) * 0.2
          bladeGlow.material.opacity = 0.12 + Math.sin(time * 5) * 0.05
          bladeGlow.scale.x = pulse
          bladeGlow.scale.y = 1.5 * pulse
        }

        // 更新护手中心宝石
        const centerGem = sword.getObjectByName('centerGem')
        if (centerGem) {
          centerGem.rotation.y += 0.05
          centerGem.rotation.x += 0.03
          centerGem.material.opacity = 0.85 + Math.sin(time * 6) * 0.15
        }

        // 更新柄尾宝石
        const pommelGem = sword.getObjectByName('pommelGem')
        if (pommelGem) {
          pommelGem.rotation.x += 0.04
          pommelGem.rotation.z += 0.03
        }

        // 更新剑尖能量
        const tipEnergy = sword.getObjectByName('tipEnergy')
        if (tipEnergy) {
          tipEnergy.material.opacity = 0.5 + Math.sin(time * 8) * 0.3
          tipEnergy.scale.x = 1 + Math.sin(time * 6) * 0.3
        }

        // 更新阴影波动
        const shadow = sword.getObjectByName('shadow')
        if (shadow) {
          const scale = 1 + Math.sin(time * 3) * 0.1
          shadow.scale.set(scale, scale, 1)
          shadow.material.opacity = 0.25 + Math.sin(time * 4) * 0.08
        }

        // 更新内层光环波动
        const innerGlow = sword.getObjectByName('innerGlow')
        if (innerGlow) {
          const scale = 1 + Math.sin(time * 5) * 0.15
          innerGlow.scale.set(scale, scale, 1)
          innerGlow.material.opacity = 0.4 + Math.sin(time * 6) * 0.12
        }

        // 更新外层光环波动
        const outerGlow = sword.getObjectByName('outerGlow')
        if (outerGlow) {
          const scale = 1 + Math.sin(time * 2.5 + 1) * 0.2
          outerGlow.scale.set(scale, scale, 1)
          outerGlow.rotation.z += 0.025
          outerGlow.material.opacity = 0.18 + Math.sin(time * 3.5) * 0.08
        }

        // 更新最外层光环
        const farGlow = sword.getObjectByName('farGlow')
        if (farGlow) {
          const scale = 1 + Math.sin(time * 2 + 2) * 0.25
          farGlow.scale.set(scale, scale, 1)
          farGlow.rotation.z -= 0.018
          farGlow.material.opacity = 0.06 + Math.sin(time * 2.5) * 0.03
        }

        // 更新剑身上方能量云
        const wave = sword.getObjectByName('wave')
        if (wave) {
          const scaleX = 1 + Math.sin(time * 4) * 0.3
          const scaleY = 0.5 + Math.sin(time * 5) * 0.2
          wave.scale.set(scaleX, scaleY, 1)
          wave.material.opacity = 0.1 + Math.sin(time * 3) * 0.05
        }

        // 更新剑尖发光
        const tipGlow = sword.getObjectByName('tipGlow')
        if (tipGlow) {
          const scale = 1 + Math.sin(time * 6) * 0.3
          tipGlow.scale.set(scale, scale, scale)
          tipGlow.material.opacity = 0.6 + Math.sin(time * 7) * 0.2
        }

        // 更新条纹波动
        for (let i = 0; i < 3; i++) {
          const stripe = sword.getObjectByName('stripe' + i)
          if (stripe) {
            const scale = 1 + Math.sin(time * (3 + i) + i * 0.5) * 0.2
            stripe.scale.set(scale, scale, 1)
            stripe.material.opacity =
              0.1 - i * 0.02 + Math.sin(time * (4 + i)) * 0.03
          }
        }

        // 更新主光源
        const mainLight = sword.getObjectByName('mainLight')
        if (mainLight) {
          mainLight.intensity = config.glow * (0.5 + Math.sin(time * 4) * 0.2)
        }

        // 更新剑身粒子
        const particles = sword.getObjectByName('particles')
        if (particles) {
          const positions = particles.geometry.attributes.position.array
          for (let i = 0; i < positions.length; i += 3) {
            positions[i + 1] += 0.01
            if (positions[i + 1] > 2.5) {
              positions[i + 1] = 0.2
            }
          }
          particles.geometry.attributes.position.needsUpdate = true
        }

        // 更新光环粒子旋转
        const ringParticles = sword.getObjectByName('ringParticles')
        if (ringParticles) {
          ringParticles.rotation.y += 0.035
          ringParticles.rotation.x = Math.sin(time) * 0.3
        }
      }

      // ==================== 关卡生成 ====================
      function generateLevel(level) {
        // 清除旧关卡
        platforms.forEach((p) => scene.remove(p))
        enemies.forEach((e) => {
          scene.remove(e.mesh)
          if (e.label) e.label.remove()
        })
        platforms = []

        const levelLength = 60 + level * 25
        const groundY = 0

        // 更真实的草地地面 - 不同深浅的绿色
        const groundMat = new THREE.MeshStandardMaterial({
          color: 0x3a7d32,
          roughness: 0.95,
          metalness: 0.0,
        })

        for (let x = -10; x < levelLength; x += 4) {
          // 主地面
          const groundGeo = new THREE.BoxGeometry(4.1, 1, 22)
          const ground = new THREE.Mesh(groundGeo, groundMat)
          ground.position.set(x, groundY - 0.5, 0)
          ground.receiveShadow = true
          scene.add(ground)
          platforms.push(ground)

          // 地面纹理 - 添加深浅变化
          const variationGeo = new THREE.BoxGeometry(3.5, 0.05, 18)
          const variationMat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(0x2d6b22).lerp(
              new THREE.Color(0x4a9b42),
              Math.random() * 0.5,
            ),
            roughness: 1.0,
          })
          const variation = new THREE.Mesh(variationGeo, variationMat)
          variation.position.set(x, groundY + 0.02, 0)
          scene.add(variation)

          // 草原装饰 - 更丰富的花草
          if (Math.random() > 0.15) {
            const grassCount = 4 + Math.floor(Math.random() * 5)
            for (let i = 0; i < grassCount; i++) {
              const grassHeight = 0.3 + Math.random() * 0.4
              const grassGeo = new THREE.ConeGeometry(
                0.06 + Math.random() * 0.08,
                grassHeight,
                4,
              )

              // 更多样的颜色
              const colorRand = Math.random()
              let grassColor
              if (colorRand > 0.4) {
                grassColor = 0x3a7d32 // 深绿
              } else if (colorRand > 0.25) {
                grassColor = 0x5aad4a // 亮绿
              } else if (colorRand > 0.15) {
                grassColor = 0x90ee90 // 浅绿
              } else if (colorRand > 0.08) {
                grassColor = 0xff69b4 // 粉色花
              } else if (colorRand > 0.02) {
                grassColor = 0xffd700 // 黄色花
              } else {
                grassColor = 0xff6347 // 红色花
              }

              const grassMat = new THREE.MeshStandardMaterial({
                color: grassColor,
                roughness: 0.8,
              })
              const grass = new THREE.Mesh(grassGeo, grassMat)
              grass.position.set(
                x + (Math.random() - 0.5) * 3.5,
                0.05 + grassHeight / 2,
                (Math.random() - 0.5) * 16,
              )
              grass.rotation.y = Math.random() * Math.PI
              grass.rotation.z = (Math.random() - 0.5) * 0.2
              scene.add(grass)
            }
          }

          // 随机树 - 更自然的分布
          if (Math.random() > 0.8) {
            createTree(
              x + (Math.random() - 0.5) * 2,
              0,
              (Math.random() - 0.5) * 12,
            )
          }

          // 随机岩石
          if (Math.random() > 0.92) {
            createRock(
              x + (Math.random() - 0.5) * 2,
              0,
              (Math.random() - 0.5) * 10,
            )
          }

          // 随机灌木
          if (Math.random() > 0.88) {
            createBush(
              x + (Math.random() - 0.5) * 3,
              0,
              (Math.random() - 0.5) * 8,
            )
          }
        }

        // 远景装饰 - 远处的大型树木
        for (let x = 0; x < levelLength; x += 20) {
          // 背景树 - 更暗、更小
          const bgTreeTrunkGeo = new THREE.CylinderGeometry(0.2, 0.35, 3, 6)
          const bgTreeTrunkMat = new THREE.MeshStandardMaterial({
            color: 0x3d2817,
            roughness: 1.0,
          })
          const bgTreeTrunk = new THREE.Mesh(bgTreeTrunkGeo, bgTreeTrunkMat)
          bgTreeTrunk.position.set(
            x + Math.random() * 15,
            1.5,
            -15 + Math.random() * 3,
          )
          scene.add(bgTreeTrunk)

          const bgLeavesGeo = new THREE.ConeGeometry(1.5, 4, 6)
          const bgLeavesMat = new THREE.MeshStandardMaterial({
            color: 0x1a4d1a,
            roughness: 1.0,
          })
          const bgLeaves = new THREE.Mesh(bgLeavesGeo, bgLeavesMat)
          bgLeaves.position.set(
            x + Math.random() * 15,
            5,
            -15 + Math.random() * 3,
          )
          scene.add(bgLeaves)
        }

        // 添加云朵
        for (let i = 0; i < 8 + level; i++) {
          createCloud(
            Math.random() * levelLength,
            15 + Math.random() * 8,
            -20 - Math.random() * 10,
          )
        }

        // 生成敌人 - 根据关卡调整数量和强度
        const enemyCount = 5 + level * 2
        const enemyNames = Object.keys(enemyTypes)

        // 普通敌人
        const normalEnemies = ['二叔', '二婶', '嘉姐', '万总']
        // 精英敌人 - 高关卡出现
        const eliteEnemies = ['铁甲', '暗影']

        for (let i = 0; i < enemyCount; i++) {
          let name

          // 关卡5以上有概率出现精英敌人
          if (level >= 5 && Math.random() < 0.25) {
            name = eliteEnemies[Math.floor(Math.random() * eliteEnemies.length)]
          } else {
            name =
              normalEnemies[
                Math.floor(
                  Math.random() * Math.min(level + 2, normalEnemies.length),
                )
              ]
          }

          const x = 15 + Math.random() * (levelLength - 30)
          const enemy = createEnemy(name, x, 1, (Math.random() - 0.5) * 8)
          // 关卡加成 - 精英敌人加成更高
          const isElite = eliteEnemies.includes(name)
          const bonus = isElite ? 1.3 : 1.0
          enemy.damage = Math.floor(enemy.damage * (1 + level * 0.1) * bonus)
          enemy.health = Math.floor(enemy.health * (1 + level * 0.08) * bonus)
          enemy.maxHealth = enemy.health
          enemies.push(enemy)
        }

        // BOSS关卡 - 更强的精英敌人
        if (level % 5 === 0) {
          const bossNames = ['铁甲', '暗影']
          const bossName =
            bossNames[Math.floor(Math.random() * bossNames.length)]
          const boss = createEnemy(bossName, levelLength - 15, 1, 0)
          boss.damage = Math.floor(boss.damage * 2)
          boss.health = Math.floor(boss.health * 3)
          boss.maxHealth = boss.health
          enemies.push(boss)
        }

        // 终点旗帜
        const flagPoleGeo = new THREE.CylinderGeometry(0.1, 0.1, 6, 8)
        const flagPoleMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 })
        const flagPole = new THREE.Mesh(flagPoleGeo, flagPoleMat)
        flagPole.position.set(levelLength, 3, 0)
        scene.add(flagPole)

        const flagGeo = new THREE.PlaneGeometry(2, 1.2)
        const flagColors = [
          0xff4444, 0xff8844, 0xffff44, 0x44ff44, 0x44ffff, 0x4444ff, 0xff44ff,
          0xff8888, 0x88ff88, 0xffd700,
        ]
        const flagColor = flagColors[(level - 1) % flagColors.length]
        const flagMat = new THREE.MeshStandardMaterial({
          color: flagColor,
          side: THREE.DoubleSide,
        })
        const flag = new THREE.Mesh(flagGeo, flagMat)
        flag.position.set(levelLength + 1, 5, 0)
        flag.name = 'flag'
        scene.add(flag)

        // 终点光效
        const endLight = new THREE.PointLight(flagColor, 1.5, 15)
        endLight.position.set(levelLength, 5, 0)
        scene.add(endLight)

        // 粒子效果
        createAmbientParticles()
      }

      function createTree(x, y, z) {
        const group = new THREE.Group()

        // 树干 - 更自然的弯曲
        const trunkHeight = 1.8 + Math.random() * 0.8
        const trunkGeo = new THREE.CylinderGeometry(0.12, 0.2, trunkHeight, 8)
        const trunkMat = new THREE.MeshStandardMaterial({
          color: 0x654321,
          roughness: 0.9,
          metalness: 0.0,
        })
        const trunk = new THREE.Mesh(trunkGeo, trunkMat)
        trunk.position.set(x, y + trunkHeight / 2, z)
        trunk.rotation.z = (Math.random() - 0.5) * 0.1
        trunk.castShadow = true
        scene.add(trunk)
        group.add(trunk)

        // 树皮纹理细节
        const barkGeo = new THREE.CylinderGeometry(
          0.14,
          0.22,
          trunkHeight * 0.6,
          8,
        )
        const barkMat = new THREE.MeshStandardMaterial({
          color: 0x5d4037,
          roughness: 1.0,
        })
        const bark = new THREE.Mesh(barkGeo, barkMat)
        bark.position.set(x, y + trunkHeight * 0.3, z)
        scene.add(bark)
        group.add(bark)

        // 多层次树冠 - 更自然的效果
        const leavesColors = [0x228b22, 0x2e8b57, 0x3cb371, 0x2f6b3f]

        // 底层大树冠
        const leavesGeo1 = new THREE.SphereGeometry(
          1.0 + Math.random() * 0.3,
          8,
          8,
        )
        const leavesMat1 = new THREE.MeshStandardMaterial({
          color: leavesColors[Math.floor(Math.random() * leavesColors.length)],
          roughness: 0.8,
        })
        const leaves1 = new THREE.Mesh(leavesGeo1, leavesMat1)
        leaves1.position.set(x, y + trunkHeight + 0.6, z)
        leaves1.scale.set(1, 0.8, 1)
        leaves1.castShadow = true
        scene.add(leaves1)
        group.add(leaves1)

        // 中层树冠
        const leavesGeo2 = new THREE.SphereGeometry(
          0.7 + Math.random() * 0.2,
          7,
          7,
        )
        const leavesMat2 = new THREE.MeshStandardMaterial({
          color: leavesColors[Math.floor(Math.random() * leavesColors.length)],
          roughness: 0.85,
        })
        const leaves2 = new THREE.Mesh(leavesGeo2, leavesMat2)
        leaves2.position.set(
          x + (Math.random() - 0.5) * 0.4,
          y + trunkHeight + 1.2,
          z + (Math.random() - 0.5) * 0.4,
        )
        leaves2.scale.set(1, 0.9, 1)
        leaves2.castShadow = true
        scene.add(leaves2)
        group.add(leaves2)

        // 顶层小树冠
        const leavesGeo3 = new THREE.ConeGeometry(
          0.5 + Math.random() * 0.2,
          1.0,
          7,
        )
        const leavesMat3 = new THREE.MeshStandardMaterial({
          color: leavesColors[Math.floor(Math.random() * leavesColors.length)],
          roughness: 0.75,
        })
        const leaves3 = new THREE.Mesh(leavesGeo3, leavesMat3)
        leaves3.position.set(
          x + (Math.random() - 0.5) * 0.2,
          y + trunkHeight + 1.8,
          z + (Math.random() - 0.5) * 0.2,
        )
        leaves3.castShadow = true
        scene.add(leaves3)
        group.add(leaves3)

        // 树下草丛装饰
        for (let i = 0; i < 3; i++) {
          const grassGeo = new THREE.ConeGeometry(0.1, 0.3, 4)
          const grassColor = Math.random() > 0.5 ? 0x228b22 : 0x90ee90
          const grassMat = new THREE.MeshStandardMaterial({ color: grassColor })
          const grass = new THREE.Mesh(grassGeo, grassMat)
          grass.position.set(
            x + (Math.random() - 0.5) * 0.8,
            y + 0.15,
            z + (Math.random() - 0.5) * 0.8,
          )
          grass.rotation.y = Math.random() * Math.PI
          scene.add(grass)
        }

        return group
      }

      function createRock(x, y, z) {
        const rockGroup = new THREE.Group()

        // 主岩石
        const rockGeo = new THREE.DodecahedronGeometry(
          0.4 + Math.random() * 0.3,
          0,
        )
        const rockMat = new THREE.MeshStandardMaterial({
          color: 0x808080,
          roughness: 0.9,
          metalness: 0.1,
        })
        const rock = new THREE.Mesh(rockGeo, rockMat)
        rock.position.set(x, y + 0.3, z)
        rock.scale.set(1, 0.7, 0.8)
        rock.rotation.set(Math.random(), Math.random(), Math.random())
        rock.castShadow = true
        scene.add(rock)
        rockGroup.add(rock)

        // 小岩石
        if (Math.random() > 0.5) {
          const smallRockGeo = new THREE.DodecahedronGeometry(
            0.15 + Math.random() * 0.1,
            0,
          )
          const smallRockMat = new THREE.MeshStandardMaterial({
            color: 0x707070,
            roughness: 0.85,
          })
          const smallRock = new THREE.Mesh(smallRockGeo, smallRockMat)
          smallRock.position.set(
            x + 0.3 + Math.random() * 0.2,
            y + 0.15,
            z + Math.random() * 0.3,
          )
          smallRock.rotation.set(Math.random(), Math.random(), Math.random())
          smallRock.castShadow = true
          scene.add(smallRock)
          rockGroup.add(smallRock)
        }

        return rockGroup
      }

      function createBush(x, y, z) {
        const bushGroup = new THREE.Group()

        const bushColors = [0x228b22, 0x2e8b57, 0x3d6b3f]
        for (let i = 0; i < 3; i++) {
          const bushGeo = new THREE.SphereGeometry(
            0.25 + Math.random() * 0.15,
            6,
            6,
          )
          const bushMat = new THREE.MeshStandardMaterial({
            color: bushColors[Math.floor(Math.random() * bushColors.length)],
            roughness: 0.8,
          })
          const bush = new THREE.Mesh(bushGeo, bushMat)
          bush.position.set(
            x + (i - 1) * 0.2,
            y + 0.2,
            z + (Math.random() - 0.5) * 0.3,
          )
          bush.scale.y = 0.7
          bush.castShadow = true
          scene.add(bush)
          bushGroup.add(bush)
        }

        return bushGroup
      }

      function createCloud(x, y, z) {
        const cloudGroup = new THREE.Group()

        const cloudMat = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          roughness: 1.0,
          transparent: true,
          opacity: 0.9,
        })

        // 创建云朵形状 - 多个球体组合
        const cloudParts = [
          { size: 1.5, offset: [0, 0, 0] },
          { size: 1.2, offset: [1.2, -0.3, 0] },
          { size: 1.0, offset: [-1.0, -0.2, 0.5] },
          { size: 0.8, offset: [0.5, 0.2, -0.4] },
          { size: 0.6, offset: [-0.8, 0.1, 0.3] },
        ]

        cloudParts.forEach((part) => {
          const cloudGeo = new THREE.SphereGeometry(part.size, 8, 8)
          const cloud = new THREE.Mesh(cloudGeo, cloudMat.clone())
          cloud.position.set(
            x + part.offset[0],
            y + part.offset[1],
            z + part.offset[2],
          )
          cloud.scale.y = 0.6
          scene.add(cloud)
          cloudGroup.add(cloud)
        })

        cloudGroup.userData.speed = 0.01 + Math.random() * 0.02
        cloudGroup.userData.startX = x

        return cloudGroup
      }

      function createPlatform(x, y, w, h, d, color) {
        const geo = new THREE.BoxGeometry(w, h, d)
        const mat = new THREE.MeshStandardMaterial({
          color: color,
          roughness: 0.8,
        })
        const mesh = new THREE.Mesh(geo, mat)
        mesh.position.set(x, y, 0)
        mesh.castShadow = true
        mesh.receiveShadow = true
        scene.add(mesh)
        return mesh
      }

      function createEnemy(name, x, y, z) {
        const config = enemyTypes[name]
        const group = new THREE.Group()

        // ===== 身体 - 更精细的设计 =====
        const bodyGeo = new THREE.CylinderGeometry(
          0.38 * config.scale,
          0.32 * config.scale,
          1.0 * config.scale,
          10,
        )
        const bodyMat = new THREE.MeshStandardMaterial({
          color: config.color,
          roughness: 0.6,
          metalness: 0.3,
        })
        const body = new THREE.Mesh(bodyGeo, bodyMat)
        body.position.y = 0.5 * config.scale
        body.castShadow = true
        group.add(body)

        // 身体装甲/护肩
        const armorGeo = new THREE.SphereGeometry(0.15 * config.scale, 8, 8)
        const armorMat = new THREE.MeshStandardMaterial({
          color: 0x333333,
          roughness: 0.4,
          metalness: 0.6,
        })

        const leftArmor = new THREE.Mesh(armorGeo, armorMat)
        leftArmor.position.set(-0.32 * config.scale, 0.85 * config.scale, 0)
        leftArmor.scale.set(1.2, 0.6, 1)
        group.add(leftArmor)

        const rightArmor = new THREE.Mesh(armorGeo, armorMat)
        rightArmor.position.set(0.32 * config.scale, 0.85 * config.scale, 0)
        rightArmor.scale.set(1.2, 0.6, 1)
        group.add(rightArmor)

        // ===== 头部 - 狰狞设计 =====
        const headGeo = new THREE.SphereGeometry(0.28 * config.scale, 10, 10)
        const headMat = new THREE.MeshStandardMaterial({
          color: config.color,
          roughness: 0.5,
          metalness: 0.2,
        })
        const head = new THREE.Mesh(headGeo, headMat)
        head.position.y = 1.1 * config.scale
        head.castShadow = true
        group.add(head)

        // 头冠/角
        const hornGeo = new THREE.ConeGeometry(
          0.06 * config.scale,
          0.2 * config.scale,
          6,
        )
        const hornMat = new THREE.MeshStandardMaterial({
          color: 0x222222,
          roughness: 0.3,
          metalness: 0.8,
        })
        const leftHorn = new THREE.Mesh(hornGeo, hornMat)
        leftHorn.position.set(
          -0.12 * config.scale,
          1.35 * config.scale,
          0.05 * config.scale,
        )
        leftHorn.rotation.z = -0.3
        group.add(leftHorn)

        const rightHorn = new THREE.Mesh(hornGeo, hornMat)
        rightHorn.position.set(
          0.12 * config.scale,
          1.35 * config.scale,
          0.05 * config.scale,
        )
        rightHorn.rotation.z = 0.3
        group.add(rightHorn)

        // ===== 愤怒的眼睛 - 发光效果 =====
        const eyeGeo = new THREE.SphereGeometry(0.05 * config.scale, 8, 8)
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 })
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat)
        leftEye.position.set(
          -0.1 * config.scale,
          1.15 * config.scale,
          0.22 * config.scale,
        )
        leftEye.name = 'leftEye'
        group.add(leftEye)

        const rightEye = new THREE.Mesh(eyeGeo, eyeMat)
        rightEye.position.set(
          0.1 * config.scale,
          1.15 * config.scale,
          0.22 * config.scale,
        )
        rightEye.name = 'rightEye'
        group.add(rightEye)

        // 眼睛光晕
        const eyeGlowGeo = new THREE.SphereGeometry(0.08 * config.scale, 8, 8)
        const eyeGlowMat = new THREE.MeshBasicMaterial({
          color: 0xff3300,
          transparent: true,
          opacity: 0.4,
        })
        const leftEyeGlow = new THREE.Mesh(eyeGlowGeo, eyeGlowMat)
        leftEyeGlow.position.copy(leftEye.position)
        group.add(leftEyeGlow)

        const rightEyeGlow = new THREE.Mesh(eyeGlowGeo, eyeGlowMat)
        rightEyeGlow.position.copy(rightEye.position)
        group.add(rightEyeGlow)

        // ===== 嘴巴/獠牙 =====
        const teethGeo = new THREE.BoxGeometry(
          0.15 * config.scale,
          0.08 * config.scale,
          0.05 * config.scale,
        )
        const teethMat = new THREE.MeshStandardMaterial({ color: 0xffffcc })
        const teeth = new THREE.Mesh(teethGeo, teethMat)
        teeth.position.set(0, 0.98 * config.scale, 0.25 * config.scale)
        group.add(teeth)

        // 左手
        const armGeo = new THREE.CylinderGeometry(
          0.08 * config.scale,
          0.06 * config.scale,
          0.5 * config.scale,
          8,
        )
        const armMat = new THREE.MeshStandardMaterial({ color: config.color })
        const leftArm = new THREE.Mesh(armGeo, armMat)
        leftArm.position.set(-0.42 * config.scale, 0.6 * config.scale, 0)
        leftArm.rotation.z = 0.3
        group.add(leftArm)

        // 右手 - 武器
        const rightArm = new THREE.Mesh(armGeo, armMat)
        rightArm.position.set(0.42 * config.scale, 0.6 * config.scale, 0)
        rightArm.rotation.z = -0.3
        group.add(rightArm)

        // 武器
        if (name === '万总') {
          // 大锤子
          const weaponHeadGeo = new THREE.BoxGeometry(
            0.4 * config.scale,
            0.3 * config.scale,
            0.25 * config.scale,
          )
          const weaponHeadMat = new THREE.MeshStandardMaterial({
            color: 0x8b0000,
            metalness: 0.7,
            roughness: 0.3,
          })
          const weaponHead = new THREE.Mesh(weaponHeadGeo, weaponHeadMat)
          weaponHead.position.set(
            0.55 * config.scale,
            0.5 * config.scale,
            0.15 * config.scale,
          )
          group.add(weaponHead)

          const weaponHandleGeo = new THREE.CylinderGeometry(
            0.06 * config.scale,
            0.06 * config.scale,
            0.8 * config.scale,
            8,
          )
          const weaponHandleMat = new THREE.MeshStandardMaterial({
            color: 0x4a3728,
          })
          const weaponHandle = new THREE.Mesh(weaponHandleGeo, weaponHandleMat)
          weaponHandle.position.set(
            0.5 * config.scale,
            0.25 * config.scale,
            0.15 * config.scale,
          )
          weaponHandle.rotation.z = -0.5
          group.add(weaponHandle)
        } else if (name === '铁甲') {
          // 盾牌
          const shieldGeo = new THREE.BoxGeometry(
            0.3 * config.scale,
            0.5 * config.scale,
            0.1 * config.scale,
          )
          const shieldMat = new THREE.MeshStandardMaterial({
            color: 0x555555,
            metalness: 0.8,
            roughness: 0.2,
          })
          const shield = new THREE.Mesh(shieldGeo, shieldMat)
          shield.position.set(
            -0.55 * config.scale,
            0.5 * config.scale,
            0.2 * config.scale,
          )
          group.add(shield)
        } else if (name === '暗影') {
          // 匕首
          const daggerGeo = new THREE.BoxGeometry(
            0.08 * config.scale,
            0.5 * config.scale,
            0.03 * config.scale,
          )
          const daggerMat = new THREE.MeshStandardMaterial({
            color: 0x222222,
            metalness: 0.9,
            roughness: 0.1,
          })
          const dagger = new THREE.Mesh(daggerGeo, daggerMat)
          dagger.position.set(
            0.5 * config.scale,
            0.45 * config.scale,
            0.15 * config.scale,
          )
          dagger.rotation.z = -0.3
          group.add(dagger)
        } else {
          // 普通武器
          const weaponGeo = new THREE.BoxGeometry(0.12, 0.7, 0.12)
          const weaponMat = new THREE.MeshStandardMaterial({
            color: 0x4a4a4a,
            metalness: 0.6,
            roughness: 0.4,
          })
          const weapon = new THREE.Mesh(weaponGeo, weaponMat)
          weapon.position.set(
            0.45 * config.scale,
            0.55 * config.scale,
            0.2 * config.scale,
          )
          weapon.rotation.z = -0.4
          group.add(weapon)
        }

        // ===== 腿部 =====
        const legGeo = new THREE.CylinderGeometry(
          0.1 * config.scale,
          0.08 * config.scale,
          0.6 * config.scale,
          8,
        )
        const legMat = new THREE.MeshStandardMaterial({ color: 0x2d3748 })

        const leftLeg = new THREE.Mesh(legGeo, legMat)
        leftLeg.position.set(-0.18 * config.scale, 0.3 * config.scale, 0)
        group.add(leftLeg)

        const rightLeg = new THREE.Mesh(legGeo, legMat)
        rightLeg.position.set(0.18 * config.scale, 0.3 * config.scale, 0)
        group.add(rightLeg)

        // 护腿
        const legArmorGeo = new THREE.BoxGeometry(
          0.15 * config.scale,
          0.25 * config.scale,
          0.12 * config.scale,
        )
        const legArmorMat = new THREE.MeshStandardMaterial({
          color: 0x333333,
          metalness: 0.6,
          roughness: 0.4,
        })
        const leftLegArmor = new THREE.Mesh(legArmorGeo, legArmorMat)
        leftLegArmor.position.set(
          -0.18 * config.scale,
          0.15 * config.scale,
          0.05 * config.scale,
        )
        group.add(leftLegArmor)

        const rightLegArmor = new THREE.Mesh(legArmorGeo, legArmorMat)
        rightLegArmor.position.set(
          0.18 * config.scale,
          0.15 * config.scale,
          0.05 * config.scale,
        )
        group.add(rightLegArmor)

        // ===== 特殊效果 =====
        // 怒气光环
        const rageGeo = new THREE.RingGeometry(
          0.5 * config.scale,
          0.7 * config.scale,
          16,
        )
        const rageMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.15,
          side: THREE.DoubleSide,
        })
        const rage = new THREE.Mesh(rageGeo, rageMat)
        rage.rotation.x = -Math.PI / 2
        rage.position.y = 0.05 * config.scale
        rage.name = 'rage'
        group.add(rage)

        // 特效粒子
        const particleGeo = new THREE.BufferGeometry()
        const particleCount = 8
        const positions = new Float32Array(particleCount * 3)
        for (let i = 0; i < particleCount * 3; i += 3) {
          const angle = (i / 3) * ((Math.PI * 2) / particleCount)
          positions[i] = Math.cos(angle) * 0.4 * config.scale
          positions[i + 1] = 0.5 + Math.random() * 0.5
          positions[i + 2] = Math.sin(angle) * 0.4 * config.scale
        }
        particleGeo.setAttribute(
          'position',
          new THREE.BufferAttribute(positions, 3),
        )
        const particleMat = new THREE.PointsMaterial({
          color: config.color,
          size: 0.08 * config.scale,
          transparent: true,
          opacity: 0.5,
        })
        const particles = new THREE.Points(particleGeo, particleMat)
        particles.name = 'particles'
        group.add(particles)

        group.position.set(x, y, z)
        scene.add(group)

        // 创建标签
        const label = document.createElement('div')
        label.className = 'enemyLabel'
        label.textContent = name
        document.getElementById('ui').appendChild(label)

        return {
          mesh: group,
          name: name,
          health: config.health,
          maxHealth: config.health,
          damage: config.damage,
          speed: config.speed,
          scale: config.scale,
          special: config.special,
          label: label,
          lastAttack: 0,
          hitFlash: 0,
          specialCooldown: 0,
          isCharging: false,
          isRaged: false,
        }
      }

      function createAmbientParticles() {
        const particleGeo = new THREE.BufferGeometry()
        const particleCount = 50
        const positions = new Float32Array(particleCount * 3)

        for (let i = 0; i < particleCount * 3; i += 3) {
          positions[i] = (Math.random() - 0.5) * 100
          positions[i + 1] = Math.random() * 15 + 2
          positions[i + 2] = (Math.random() - 0.5) * 20
        }

        particleGeo.setAttribute(
          'position',
          new THREE.BufferAttribute(positions, 3),
        )

        // 蝴蝶/萤火虫效果
        const particleMat = new THREE.PointsMaterial({
          color: 0xffcc88,
          size: 0.15,
          transparent: true,
          opacity: 0.7,
          blending: THREE.AdditiveBlending,
        })

        const particleSystem = new THREE.Points(particleGeo, particleMat)
        scene.add(particleSystem)
        particles.push(particleSystem)
      }

      // ==================== 游戏逻辑 ====================
      function startGame() {
        document.getElementById('startScreen').style.display = 'none'
        gameRunning = true
        currentLevel = 1
        score = 0
        kills = 0
        weaponLevel = 1
        playerHealth = 100

        createPlayer()
        generateLevel(currentLevel)
        updateUI()
      }

      function restartGame() {
        document.getElementById('gameOverScreen').style.display = 'none'
        document.getElementById('victoryScreen').style.display = 'none'

        // 清理场景
        if (player) {
          scene.remove(player)
          player = null
        }
        enemies.forEach((e) => {
          if (e.label) e.label.remove()
        })

        startGame()
      }

      function nextLevel() {
        document.getElementById('levelCompleteScreen').style.display = 'none'
        currentLevel++
        playerHealth = Math.min(playerHealth + 40, maxHealth)

        // 重置玩家位置
        player.position.set(0, 1, 0)
        playerVelocity.set(0, 0, 0)

        generateLevel(currentLevel)
        updateUI()
        gameRunning = true
      }

      function gameOver(reason) {
        gameRunning = false
        document.getElementById('gameOverText').textContent =
          `${reason}\n最终分数: ${score} | 击杀数: ${kills}`
        document.getElementById('gameOverScreen').style.display = 'flex'
      }

      function levelComplete() {
        gameRunning = false
        const texts = [
          '',
          '恭喜通过第一关！',
          '第二关完成，继续加油！',
          '太厉害了！第三关通过！',
          '第四关完成！',
          '第五关完成！',
          '第六关完成！',
          '第七关完成！',
          '第八关完成！',
          '第九关完成！',
          '最后一关，冲啊！',
        ]
        document.getElementById('levelCompleteText').textContent =
          `${texts[currentLevel]}\n分数: ${score} | 击杀: ${kills}`
        document.getElementById('levelCompleteScreen').style.display = 'flex'
      }

      function victory() {
        gameRunning = false
        document.getElementById('victoryText').textContent =
          `🏆 恭喜翠翠完成大冒险！\n\n` +
          `最终分数: ${score}\n` +
          `总击杀数: ${kills}\n` +
          `最终武器: ${weaponConfigs[weaponLevel].name}\n\n` +
          `你就是传说中的翠翠勇士！`
        document.getElementById('victoryScreen').style.display = 'flex'
      }

      // ==================== 更新逻辑 ====================
      function updatePlayer(deltaTime) {
        if (!player) return

        const speed = 0.15
        const jumpPower = 0.35

        // 移动
        let moveX = 0
        if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1
        if (keys['ArrowRight'] || keys['KeyD']) moveX = 1

        // 应用移动
        playerVelocity.x = moveX * speed

        // 跳跃
        if ((keys['Space'] || keys['ArrowUp']) && !isJumping) {
          playerVelocity.y = jumpPower
          isJumping = true
          createJumpEffect(player.position)
        }

        // 重力
        playerVelocity.y -= 0.015

        // 应用速度
        player.position.add(playerVelocity)

        // 行走动画
        if (moveX !== 0 && !isJumping) {
          const animSpeed = 12
          player.userData.leftLeg.rotation.x =
            Math.sin(Date.now() * 0.01 * animSpeed) * 0.5
          player.userData.rightLeg.rotation.x =
            -Math.sin(Date.now() * 0.01 * animSpeed) * 0.5
          player.userData.leftArm.rotation.x =
            -Math.sin(Date.now() * 0.01 * animSpeed) * 0.3
          player.userData.rightArm.rotation.x =
            Math.sin(Date.now() * 0.01 * animSpeed) * 0.3
        } else {
          player.userData.leftLeg.rotation.x *= 0.8
          player.userData.rightLeg.rotation.x *= 0.8
          player.userData.leftArm.rotation.x *= 0.8
          player.userData.rightArm.rotation.x *= 0.8
        }

        // 披风飘动效果
        if (player.userData.cape) {
          const capeWave = Math.sin(Date.now() * 0.005) * 0.1
          player.userData.cape.rotation.z = capeWave
          player.userData.cape.rotation.x = 0.1 + capeWave * 0.3
        }

        // 转向
        if (moveX > 0) player.rotation.y = 0
        if (moveX < 0) player.rotation.y = Math.PI

        // 头部始终面向玩家（Sprite默认就会面向相机）

        // 地面碰撞检测
        let onGround = false
        for (let platform of platforms) {
          const px = platform.position.x
          const py = platform.position.y
          const pw = platform.geometry.parameters.width
          const ph = platform.geometry.parameters.height

          if (
            player.position.x > px - pw / 2 - 0.3 &&
            player.position.x < px + pw / 2 + 0.3 &&
            player.position.y > py + ph / 2 - 0.5 &&
            player.position.y < py + ph / 2 + 0.5 &&
            playerVelocity.y <= 0
          ) {
            player.position.y = py + ph / 2 + 0.6 * player.scale.y
            playerVelocity.y = 0
            isJumping = false
            onGround = true
          }
        }

        // 终点检测 - 通过旗帜位置
        const levelLength = 60 + currentLevel * 25
        if (player.position.x >= levelLength - 2) {
          if (currentLevel >= 10) {
            victory()
          } else {
            levelComplete()
          }
        }

        // 掉落检测 - 草原上不会掉死，只扣血并重置位置
        if (player.position.y < -5) {
          playerHealth -= 15
          player.position.set(Math.max(0, player.position.x - 10), 3, 0)
          playerVelocity.set(0, 0, 0)
          showDamageEffect()
          if (playerHealth <= 0) gameOver('体力耗尽...')
        }

        // 攻击冷却
        if (isAttacking) {
          const attackDuration = 300
          if (Date.now() - attackStartTime > attackDuration) {
            isAttacking = false
          }
        }

        // 剑动画 - 攻击时拖尾效果
        if (sword) {
          const baseRot = -Math.PI / 4
          if (isAttacking) {
            const progress = (Date.now() - attackStartTime) / 300
            sword.rotation.z = baseRot + Math.sin(progress * Math.PI) * 2.5
            sword.rotation.x = Math.sin(progress * Math.PI * 2) * 0.8
            // 攻击时增强发光
            sword.children.forEach((child) => {
              if (child.material && child.material.opacity !== undefined) {
                child.material.opacity = Math.min(
                  1,
                  (child.material.opacity || 0) + 0.1,
                )
              }
            })
          } else {
            sword.rotation.z += (baseRot - sword.rotation.z) * 0.2
            sword.rotation.x *= 0.8
          }
        }

        // 武器发光
        if (player.userData.glow) {
          const glow = player.userData.glow
          glow.material.color.setHex(weaponConfigs[weaponLevel].color)
          glow.material.opacity =
            0.1 + Math.sin(Date.now() * 0.005) * 0.05 * weaponLevel
        }

        // 连击计时
        if (comboTimer > 0) {
          comboTimer -= deltaTime
          if (comboTimer <= 0) comboCount = 0
        }
      }

      function updateCamera() {
        if (!player) return

        const targetPos = player.position.clone().add(cameraOffset)
        camera.position.lerp(targetPos, 0.1)
        camera.lookAt(
          player.position.x,
          player.position.y + 1,
          player.position.z,
        )
      }

      function updateEnemies(deltaTime) {
        const now = Date.now()

        enemies.forEach((enemy, index) => {
          if (enemy.health <= 0) return

          const dx = player.position.x - enemy.mesh.position.x
          const dy = player.position.y - enemy.mesh.position.y
          const dz = player.position.z - enemy.mesh.position.z
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz)

          // 更新怒气光环效果
          const rage = enemy.mesh.getObjectByName('rage')
          if (rage) {
            const rageScale = 1 + Math.sin(now * 0.003) * 0.15
            rage.scale.set(rageScale, rageScale, 1)
            rage.material.opacity = 0.1 + Math.sin(now * 0.004) * 0.08
          }

          // 更新粒子效果
          const particles = enemy.mesh.getObjectByName('particles')
          if (particles) {
            particles.rotation.y += 0.02
            const positions = particles.geometry.attributes.position.array
            for (let i = 0; i < positions.length; i += 3) {
              positions[i + 1] += 0.008
              if (positions[i + 1] > 1.5) {
                positions[i + 1] = 0.3
              }
            }
            particles.geometry.attributes.position.needsUpdate = true
          }

          // ===== 特殊技能处理 =====
          if (enemy.special && enemy.specialCooldown <= 0) {
            switch (enemy.special) {
              case 'shield':
                // 护盾技能 - 每隔一段时间给自己加护盾
                if (enemy.health < enemy.maxHealth * 0.5) {
                  createShieldEffect(enemy)
                  enemy.specialCooldown = 8000 // 8秒冷却
                }
                break
              case 'charge':
                // 冲锋技能 - 快速冲向玩家
                if (dist < 8 && dist > 2) {
                  enemy.isCharging = true
                  enemy.mesh.position.x += (dx / dist) * enemy.speed * 4
                  enemy.mesh.position.z += (dz / dist) * enemy.speed * 4
                  createChargeTrail(enemy)
                  enemy.specialCooldown = 5000
                }
                break
              case 'heal':
                // 自我治疗
                if (enemy.health < enemy.maxHealth * 0.6) {
                  enemy.health += 5
                  createHealEffect(enemy)
                  enemy.specialCooldown = 6000
                }
                break
              case 'rage':
                // 狂暴化 - 血量低时提升速度和伤害
                if (enemy.health < enemy.maxHealth * 0.3 && !enemy.isRaged) {
                  enemy.isRaged = true
                  enemy.speed *= 1.8
                  enemy.damage *= 1.5
                  createRageEffect(enemy)
                  enemy.specialCooldown = 10000
                }
                break
              case 'reflect':
                // 伤害反射 - 概率反射伤害
                if (enemy.health < enemy.maxHealth * 0.4) {
                  createReflectEffect(enemy)
                  enemy.specialCooldown = 7000
                }
                break
              case 'teleport':
                // 瞬移 - 随机传送到玩家附近
                if (dist < 10 && Math.random() < 0.02) {
                  const teleportX =
                    player.position.x + (Math.random() - 0.5) * 4
                  const teleportZ =
                    player.position.z + (Math.random() - 0.5) * 3
                  createTeleportEffect(enemy.mesh.position.clone())
                  enemy.mesh.position.x = Math.max(
                    0,
                    Math.min(50 + currentLevel * 20, teleportX),
                  )
                  enemy.mesh.position.z = Math.max(-7, Math.min(7, teleportZ))
                  createTeleportEffect(enemy.mesh.position.clone())
                  enemy.specialCooldown = 4000
                }
                break
            }
          }
          if (enemy.specialCooldown > 0) enemy.specialCooldown -= deltaTime

          // ===== 增强的AI移动 =====
          if (!enemy.isCharging) {
            // 追击玩家
            if (dist > 1.2 && dist < 18) {
              const currentSpeed = enemy.isRaged
                ? enemy.speed * 1.5
                : enemy.speed
              enemy.mesh.position.x += (dx / dist) * currentSpeed
              enemy.mesh.position.z += (dz / dist) * currentSpeed * 0.5

              // 限制z轴范围
              enemy.mesh.position.z = Math.max(
                -7,
                Math.min(7, enemy.mesh.position.z),
              )
              enemy.mesh.lookAt(
                player.position.x,
                enemy.mesh.position.y,
                player.position.z,
              )
            }

            // 躲避行为 - 低血量时更谨慎
            if (enemy.health < enemy.maxHealth * 0.3 && dist < 2) {
              enemy.mesh.position.x -= (dx / dist) * enemy.speed * 0.5
            }
          } else {
            // 冲锋结束
            if (dist < 1.5) {
              enemy.isCharging = false
            }
          }

          // ===== 增强的攻击 =====
          const attackCooldown = enemy.isRaged ? 800 : 1200
          if (dist < 1.5 && now - enemy.lastAttack > attackCooldown) {
            // 冲锋状态造成更多伤害
            const damageMultiplier = enemy.isCharging ? 1.5 : 1.0
            const actualDamage = Math.floor(
              enemy.damage * damageMultiplier * (currentLevel * 0.1 + 1),
            )
            playerHealth -= actualDamage
            enemy.lastAttack = now
            showDamageEffect()
            createHitEffect(player.position, 0xff0000)

            // 增强的击退效果
            const knockback = enemy.isCharging ? 0.25 : 0.12
            playerVelocity.x +=
              (player.position.x - enemy.mesh.position.x) * knockback
            playerVelocity.y = enemy.isCharging ? 0.25 : 0.15

            // 攻击特效
            createAttackEffect(enemy)

            if (playerHealth <= 0) gameOver(`被${enemy.name}击败了...`)
          }

          // 受击闪烁
          if (enemy.hitFlash > 0) {
            enemy.hitFlash--
            enemy.mesh.children.forEach((child) => {
              if (child.material) {
                child.material.emissive.setHex(0xff3300)
              }
            })
          } else {
            enemy.mesh.children.forEach((child) => {
              if (child.material && child.material.emissive) {
                child.material.emissive.setHex(0)
              }
            })
          }

          // 更新标签位置
          updateEnemyLabel(enemy)
        })

        // 清理死亡敌人
        enemies = enemies.filter((enemy) => {
          if (enemy.health <= 0) {
            scene.remove(enemy.mesh)
            if (enemy.label) enemy.label.remove()

            // 升级检查
            kills++
            score += 100 * weaponLevel
            checkWeaponUpgrade()

            // 死亡特效
            createExplosion(enemy.mesh.position, enemyTypes[enemy.name].color)

            return false
          }
          return true
        })
      }

      // ===== 敌人特殊效果函数 =====
      function createShieldEffect(enemy) {
        const shieldGeo = new THREE.SphereGeometry(0.8 * enemy.scale, 16, 16)
        const shieldMat = new THREE.MeshBasicMaterial({
          color: 0x4488ff,
          transparent: true,
          opacity: 0.3,
          side: THREE.DoubleSide,
        })
        const shield = new THREE.Mesh(shieldGeo, shieldMat)
        shield.name = 'shield'
        enemy.mesh.add(shield)

        // 护盾持续时间
        setTimeout(() => {
          if (enemy.mesh.getObjectByName('shield')) {
            enemy.mesh.remove(enemy.mesh.getObjectByName('shield'))
          }
        }, 3000)
      }

      function createChargeTrail(enemy) {
        const trailGeo = new THREE.SphereGeometry(0.15 * enemy.scale, 8, 8)
        const trailMat = new THREE.MeshBasicMaterial({
          color: 0xff4400,
          transparent: true,
          opacity: 0.6,
        })
        const trail = new THREE.Mesh(trailGeo, trailMat)
        trail.position.copy(enemy.mesh.position)
        scene.add(trail)

        setTimeout(() => scene.remove(trail), 500)
      }

      function createHealEffect(enemy) {
        const healGeo = new THREE.RingGeometry(0.3, 0.5, 16)
        const healMat = new THREE.MeshBasicMaterial({
          color: 0x00ff00,
          transparent: true,
          opacity: 0.6,
          side: THREE.DoubleSide,
        })
        const heal = new THREE.Mesh(healGeo, healMat)
        heal.rotation.x = -Math.PI / 2
        heal.position.copy(enemy.mesh.position)
        heal.position.y += 0.5
        scene.add(heal)

        let healTime = 0
        const healInterval = setInterval(() => {
          healTime += 0.1
          heal.position.y += 0.05
          heal.material.opacity -= 0.02
          if (healTime > 2) {
            clearInterval(healInterval)
            scene.remove(heal)
          }
        }, 50)
      }

      function createRageEffect(enemy) {
        const rageGeo = new THREE.SphereGeometry(1.2 * enemy.scale, 16, 16)
        const rageMat = new THREE.MeshBasicMaterial({
          color: 0xff0000,
          transparent: true,
          opacity: 0.4,
        })
        const rage = new THREE.Mesh(rageGeo, rageMat)
        rage.position.y = 0.5 * enemy.scale
        rage.name = 'rageAura'
        enemy.mesh.add(rage)

        // 眼睛变红
        enemy.mesh.children.forEach((child) => {
          if (child.name === 'leftEye' || child.name === 'rightEye') {
            child.material.color.setHex(0xffff00)
          }
        })
      }

      function createReflectEffect(enemy) {
        const reflectGeo = new THREE.RingGeometry(0.4, 0.6, 16)
        const reflectMat = new THREE.MeshBasicMaterial({
          color: 0xffaa00,
          transparent: true,
          opacity: 0.5,
          side: THREE.DoubleSide,
        })
        const reflect = new THREE.Mesh(reflectGeo, reflectMat)
        reflect.position.y = 0.3 * enemy.scale
        reflect.rotation.x = -Math.PI / 2
        reflect.name = 'reflect'
        enemy.mesh.add(reflect)
      }

      function createTeleportEffect(position) {
        for (let i = 0; i < 8; i++) {
          const particleGeo = new THREE.SphereGeometry(0.1, 6, 6)
          const particleMat = new THREE.MeshBasicMaterial({
            color: 0x8844ff,
            transparent: true,
            opacity: 0.8,
          })
          const particle = new THREE.Mesh(particleGeo, particleMat)
          particle.position.copy(position)
          particle.position.y += 0.5
          scene.add(particle)

          const angle = (i / 8) * Math.PI * 2
          const animate = () => {
            particle.position.x += Math.cos(angle) * 0.1
            particle.position.z += Math.sin(angle) * 0.1
            particle.material.opacity -= 0.03
            if (particle.material.opacity > 0) {
              requestAnimationFrame(animate)
            } else {
              scene.remove(particle)
            }
          }
          animate()
        }
      }

      function createAttackEffect(enemy) {
        const effectGeo = new THREE.SphereGeometry(0.3 * enemy.scale, 8, 8)
        const effectMat = new THREE.MeshBasicMaterial({
          color: enemyTypes[enemy.name].color,
          transparent: true,
          opacity: 0.5,
        })
        const effect = new THREE.Mesh(effectGeo, effectMat)
        effect.position.copy(player.position)
        scene.add(effect)

        let effectTime = 0
        const effectInterval = setInterval(() => {
          effectTime += 0.1
          effect.scale.multiplyScalar(1.1)
          effect.material.opacity -= 0.05
          if (effectTime > 1) {
            clearInterval(effectInterval)
            scene.remove(effect)
          }
        }, 30)
      }

      function updateEnemyLabel(enemy) {
        if (!enemy.label) return

        const vector = enemy.mesh.position.clone()
        vector.y += 1.5
        vector.project(camera)

        const x = (vector.x * 0.5 + 0.5) * window.innerWidth
        const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight

        if (vector.z < 1) {
          enemy.label.style.left = x + 'px'
          enemy.label.style.top = y + 'px'
          enemy.label.style.display = 'block'
        } else {
          enemy.label.style.display = 'none'
        }
      }

      function updateParticles() {
        particles.forEach((p) => {
          p.rotation.y += 0.001
        })
      }

      function checkWeaponUpgrade() {
        // 20级武器：每5杀升1级
        const newLevel = Math.min(Math.floor(kills / 5) + 1, 20)
        if (newLevel > weaponLevel) {
          weaponLevel = newLevel

          // 升级特效
          createUpgradeEffect(player.position)

          // 更新剑
          player.remove(sword)
          sword = createSword(weaponLevel)
          sword.position.set(0.6, 0.8, 0.5)
          sword.rotation.z = -Math.PI / 4
          player.add(sword)

          // 恢复生命
          playerHealth = Math.min(playerHealth + 30, maxHealth)

          // 显示升级提示
          showLevelUpText(weaponLevel)
        }
      }

      function showLevelUpText(level) {
        const config = weaponConfigs[level]
        const div = document.createElement('div')
        div.style.cssText = `
          position: absolute;
          left: 50%;
          top: 35%;
          transform: translate(-50%, -50%);
          color: ${config.color === 0xffd700 ? '#ffd700' : '#fff'};
          font-size: 28px;
          font-weight: bold;
          text-shadow: 2px 2px 4px #000;
          pointer-events: none;
          animation: levelUpAnim 2s ease-out forwards;
        `
        div.textContent = `⚔️ 武器升级! ${config.name}`
        document.getElementById('ui').appendChild(div)

        setTimeout(() => div.remove(), 2000)
      }

      function createUpgradeEffect(pos) {
        // 武器升级特效 - 炫彩光环
        const colors = [
          0xff0000, 0xff8800, 0xffff00, 0x00ff00, 0x00ffff, 0x0000ff, 0xff00ff,
          0xffd700,
        ]
        colors.forEach((color, i) => {
          setTimeout(() => {
            createExplosion(pos, color, 2)
          }, i * 80)
        })

        // 中心光球
        const sphereGeo = new THREE.SphereGeometry(0.8, 16, 16)
        const sphereMat = new THREE.MeshBasicMaterial({
          color: weaponConfigs[weaponLevel].color,
          transparent: true,
          opacity: 0.9,
        })
        const sphere = new THREE.Mesh(sphereGeo, sphereMat)
        sphere.position.copy(pos)
        sphere.position.y += 1.5
        scene.add(sphere)

        // 光环
        const haloGeo = new THREE.RingGeometry(0.5, 1.5, 32)
