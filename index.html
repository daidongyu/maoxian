<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>翠翠大冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #90EE90 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            touch-action: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #healthBar {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 220px;
            height: 28px;
            background: rgba(0,0,0,0.4);
            border: 2px solid #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #healthFill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8844, #ffaa44);
            transition: width 0.3s ease;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.3);
        }
        
        #expBar {
            position: absolute;
            top: 52px;
            left: 20px;
            width: 180px;
            height: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #fff;
            border-radius: 6px;
            overflow: hidden;
        }
        
        #expFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4488ff, #44ff88);
            transition: width 0.3s ease;
        }
        
        #scoreBoard {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5);
            font-size: 18px;
            text-align: right;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 10px;
        }
        
        #levelInfo {
            position: absolute;
            top: 70px;
            left: 20px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 22px;
            font-weight: bold;
        }
        
        #weaponInfo {
            position: absolute;
            top: 100px;
            left: 20px;
            color: #00ffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 18px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        #startScreen, #gameOverScreen, #levelCompleteScreen, #victoryScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 100;
        }
        
        #gameOverScreen, #levelCompleteScreen, #victoryScreen {
            display: none;
        }
        
        .title {
            font-size: 56px;
            color: #ffd700;
            text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b, 0 0 60px #ffd700;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b; }
            50% { text-shadow: 0 0 30px #ffd700, 0 0 60px #ffd700, 0 0 80px #ff6b6b; }
        }
        
        .subtitle {
            font-size: 22px;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
            max-width: 700px;
            line-height: 1.8;
        }
        
        .btn {
            padding: 18px 50px;
            font-size: 26px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 35px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.8);
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 15px;
            line-height: 2;
            background: rgba(0,0,0,0.4);
            padding: 15px 20px;
            border-radius: 10px;
        }
        
        #mobileControls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: none;
            pointer-events: auto;
            padding: 0 20px;
        }
        
        .controlRow {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
        }
        
        .controlBtn {
            width: 65px;
            height: 65px;
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: manipulation;
            backdrop-filter: blur(5px);
        }
        
        .controlBtn:active {
            background: rgba(255,255,255,0.5);
            transform: scale(0.95);
        }
        
        .controlBtn.large {
            width: 85px;
            height: 85px;
            font-size: 36px;
            background: rgba(255,100,100,0.4);
        }
        
        .controlBtn.attack {
            background: rgba(255,200,50,0.5);
            box-shadow: 0 0 20px rgba(255,200,50,0.4);
        }
        
        .dPad {
            display: flex;
            gap: 12px;
        }
        
        .dPadVertical {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        #damageOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(255,0,0,0.4) 100%);
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
        }
        
        .enemyLabel {
            position: absolute;
            color: #ff6b6b;
            font-size: 15px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9), 0 0 5px rgba(0,0,0,0.8);
            pointer-events: none;
            transform: translate(-50%, -100%);
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .weaponUpgradePopup {
            position: absolute;
            left: 50%;
            top: 30%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b;
            pointer-events: none;
            animation: popupAnim 2s ease-out forwards;
            text-align: center;
        }
        
        @keyframes popupAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -80%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -100%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(1); }
        }
        
        @media (max-width: 768px) {
            .title { font-size: 38px; }
            .subtitle { font-size: 16px; padding: 0 20px; }
            #controls { display: none; }
            #mobileControls { display: block; }
            #scoreBoard { font-size: 14px; }
            #levelInfo { font-size: 18px; }
            #weaponInfo { font-size: 14px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="healthBar">
            <div id="healthFill"></div>
        </div>
        <div id="expBar">
            <div id="expFill"></div>
        </div>
        <div id="levelInfo">第 1 关 - 草原启程</div>
        <div id="weaponInfo">🗡️ 木剑 Lv.1</div>
        <div id="scoreBoard">
            分数: <span id="score">0</span><br>
            击杀: <span id="kills">0</span>
        </div>
        <div id="controls">
            WASD / 方向键: 移动<br>
            空格: 跳跃 | C: 下蹲<br>
            J / 点击: 攻击
        </div>
    </div>
    
    <div id="mobileControls">
        <div class="controlRow">
            <div class="dPad">
                <div class="controlBtn" id="btnLeft">←</div>
                <div class="dPadVertical">
                    <div class="controlBtn" id="btnJump">↑</div>
                    <div class="controlBtn" id="btnCrouch">↓</div>
                </div>
                <div class="controlBtn" id="btnRight">→</div>
            </div>
            <div class="controlBtn large attack" id="btnAttack">⚔️</div>
        </div>
    </div>
    
    <div id="damageOverlay"></div>
    
    <div id="startScreen">
        <h1 class="title">🌿 翠翠大冒险</h1>
        <p class="subtitle">
            翠翠手持长剑，踏上草原冒险之旅<br>
            击败二叔、二婶、嘉姐、万总等怪物升级武器<br>
            10级神兵等你解锁，挑战三关成为传说！
        </p>
        <button class="btn" onclick="startGame()">开始冒险</button>
    </div>
    
    <div id="gameOverScreen">
        <h1 class="title">💀 游戏结束</h1>
        <p class="subtitle" id="gameOverText"></p>
        <button class="btn" onclick="restartGame()">重新开始</button>
    </div>
    
    <div id="levelCompleteScreen">
        <h1 class="title">🎉 关卡完成！</h1>
        <p class="subtitle" id="levelCompleteText"></p>
        <button class="btn" onclick="nextLevel()">下一关</button>
    </div>
    
    <div id="victoryScreen">
        <h1 class="title">🏆 通关大吉！</h1>
        <p class="subtitle" id="victoryText"></p>
        <button class="btn" onclick="restartGame()">再玩一次</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==================== 游戏全局变量 ====================
        let scene, camera, renderer;
        let player, playerVelocity = new THREE.Vector3();
        let isJumping = false, isCrouching = false, isAttacking = false;
        let platforms = [], enemies = [], particles = [], grassBlades = [], clouds = [];
        let weaponLevel = 1, score = 0, kills = 0, currentLevel = 1;
        let playerHealth = 100, maxHealth = 100;
        let exp = 0, expToNext = 3; // 击杀3个敌人升级
        let gameRunning = false;
        let cameraOffset = new THREE.Vector3(0, 6, 12);
        let enemyLabels = [];
        let animationId;
        let keys = {};
        let sword, attackEffects = [];
        let comboCount = 0, comboTimer = 0;
        let invincibleTime = 0;
        let backgroundTexture;
        
        // 10级武器配置 - 越来越帅，特效越来越强
        const weaponConfigs = {
            1: { name: '🗡️ 木剑', color: 0x8B4513, damage: 30, range: 2.5, glow: 0, particleCount: 0, trail: false, spin: false },
            2: { name: '⚔️ 铁剑', color: 0x708090, damage: 45, range: 2.8, glow: 0.2, particleCount: 5, trail: false, spin: false },
            3: { name: '🔥 火焰剑', color: 0xff4400, damage: 60, range: 3.0, glow: 0.4, particleCount: 10, trail: true, spin: false },
            4: { name: '⚡ 雷霆剑', color: 0x00ffff, damage: 80, range: 3.3, glow: 0.6, particleCount: 15, trail: true, spin: false },
            5: { name: '💀 暗影刃', color: 0x9400D3, damage: 100, range: 3.5, glow: 0.7, particleCount: 20, trail: true, spin: false },
            6: { name: '🌟 圣光剑', color: 0xFFD700, damage: 125, range: 3.8, glow: 0.8, particleCount: 25, trail: true, spin: true },
            7: { name: '🐉 龙牙剑', color: 0xDC143C, damage: 150, range: 4.0, glow: 0.9, particleCount: 30, trail: true, spin: true },
            8: { name: '❄️ 冰霜剑', color: 0x00CED1, damage: 180, range: 4.3, glow: 1.0, particleCount: 35, trail: true, spin: true },
            9: { name: '☀️ 日耀剑', color: 0xFF4500, damage: 220, range: 4.5, glow: 1.2, particleCount: 40, trail: true, spin: true },
            10: { name: '👑 翠翠传说', color: 0xFFD700, damage: 300, range: 5.0, glow: 1.5, particleCount: 50, trail: true, spin: true, ultimate: true }
        };
        
        // 敌人配置 - 更多样化
        const enemyTypes = {
            '二叔': { color: 0x4a5568, health: 50, damage: 8, speed: 0.025, scale: 1.1, exp: 1 },
            '二婶': { color: 0xe53e3e, health: 40, damage: 10, speed: 0.035, scale: 0.95, exp: 1 },
            '嘉姐': { color: 0x805ad5, health: 70, damage: 12, speed: 0.04, scale: 1.05, exp: 2 },
            '万总': { color: 0x38a169, health: 120, damage: 15, speed: 0.02, scale: 1.3, exp: 3 },
            '小喽啰': { color: 0x718096, health: 25, damage: 5, speed: 0.03, scale: 0.85, exp: 1 },
            '精英怪': { color: 0xd69e2e, health: 100, damage: 18, speed: 0.045, scale: 1.15, exp: 2 }
        };
        
        // ==================== 初始化 ====================
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 15, 80);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(cameraOffset);
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('gameCanvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // 环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            // 阳光
            const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.0);
            sunLight.position.set(20, 30, 10);
            sunLight.castShadow = true;
            sunLight.shadow.camera.left = -50;
            sunLight.shadow.camera.right = 50;
            sunLight.shadow.camera.top = 50;
            sunLight.shadow.camera.bottom = -50;
            sunLight.shadow.mapSize.width = 4096;
            sunLight.shadow.mapSize.height = 4096;
            sunLight.shadow.bias = -0.0001;
            scene.add(sunLight);
            
            // 事件监听
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            document.addEventListener('mousedown', onMouseDown);
            
            setupMobileControls();
            createBeautifulEnvironment();
            animate();
        }
        
        function setupMobileControls() {
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnJump = document.getElementById('btnJump');
            const btnCrouch = document.getElementById('btnCrouch');
            const btnAttack = document.getElementById('btnAttack');
            
            const addTouch = (btn, code) => {
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[code] = true; });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[code] = false; });
                btn.addEventListener('mousedown', () => keys[code] = true);
                btn.addEventListener('mouseup', () => keys[code] = false);
            };
            
            addTouch(btnLeft, 'ArrowLeft');
            addTouch(btnRight, 'ArrowRight');
            addTouch(btnJump, 'Space');
            addTouch(btnCrouch, 'KeyC');
            btnAttack.addEventListener('touchstart', (e) => { e.preventDefault(); attack(); });
            btnAttack.addEventListener('mousedown', attack);
        }
        
        // ==================== 优美草原环境 ====================
        function createBeautifulEnvironment() {
            // 大面积草地地面
            const groundGeo = new THREE.PlaneGeometry(200, 50, 50, 20);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x4a7c59,
                roughness: 1,
            });
            
            // 给草地一些起伏
            const positions = groundGeo.attributes.position.array;
            for (let i = 2; i < positions.length; i += 3) {
                positions[i] = Math.random() * 0.3;
            }
            groundGeo.computeVertexNormals();
            
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // 创建大量草叶
            createGrassField();
            
            // 创建云朵
            createClouds();
            
            // 创建装饰花朵
            createFlowers();
            
            // 远处的山
            createMountains();
            
            // 树木
            createTrees();
            
            // 环境粒子
            createAmbientParticles();
        }
        
        function createGrassField() {
            const grassColors = [0x4a7c59, 0x5a8c69, 0x6a9c79, 0x3a6c49];
            
            for (let i = 0; i < 800; i++) {
                const height = 0.3 + Math.random() * 0.4;
                const grassGeo = new THREE.ConeGeometry(0.03, height, 4);
                const grassMat = new THREE.MeshStandardMaterial({ 
                    color: grassColors[Math.floor(Math.random() * grassColors.length)],
                    roughness: 0.8
                });
                const grass = new THREE.Mesh(grassGeo, grassMat);
                
                grass.position.x = (Math.random() - 0.5) * 180;
                grass.position.z = (Math.random() - 0.5) * 20;
                grass.position.y = height / 2;
                grass.rotation.y = Math.random() * Math.PI;
                grass.rotation.z = (Math.random() - 0.5) * 0.2;
                grass.scale.x = 0.5 + Math.random() * 0.5;
                grass.scale.z = 0.5 + Math.random() * 0.5;
                
                grassBlades.push({
                    mesh: grass,
                    baseRotation: grass.rotation.z,
                    swaySpeed: 0.5 + Math.random() * 1.5,
                    swayAmount: 0.05 + Math.random() * 0.1
                });
                
                scene.add(grass);
            }
        }
        
        function createClouds() {
            for (let i = 0; i < 15; i++) {
                const cloudGroup = new THREE.Group();
                const puffCount = 3 + Math.floor(Math.random() * 4);
                
                for (let j = 0; j < puffCount; j++) {
                    const puffGeo = new THREE.SphereGeometry(1 + Math.random() * 1.5, 8, 8);
                    const puffMat = new THREE.MeshBasicMaterial({
                        color: 0xffffff,
                        transparent: true,
                        opacity: 0.7 + Math.random() * 0.2
                    });
                    const puff = new THREE.Mesh(puffGeo, puffMat);
                    puff.position.set(
                        (Math.random() - 0.5) * 3,
                        (Math.random() - 0.5) * 1,
                        (Math.random() - 0.5) * 2
                    );
                    cloudGroup.add(puff);
                }
                
                cloudGroup.position.set(
                    (Math.random() - 0.5) * 150,
                    15 + Math.random() * 10,
                    -20 - Math.random() * 30
                );
                
                clouds.push({
                    mesh: cloudGroup,
                    speed: 0.01 + Math.random() * 0.02
                });
                
                scene.add(cloudGroup);
            }
        }
        
        function createFlowers() {
            const flowerColors = [0xff69b4, 0xffd700, 0xff6347, 0x9370db, 0x00ced1];
            
            for (let i = 0; i < 100; i++) {
                const flowerGroup = new THREE.Group();
                
                // 花茎
                const stemGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 4);
                const stemMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
                const stem = new THREE.Mesh(stemGeo, stemMat);
                stem.position.y = 0.15;
                flowerGroup.add(stem);
                
                // 花瓣
                const petalColor = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                const petalGeo = new THREE.SphereGeometry(0.08, 6, 6);
                const petalMat = new THREE.MeshStandardMaterial({ color: petalColor });
                
                for (let j = 0; j < 5; j++) {
                    const petal = new THREE.Mesh(petalGeo, petalMat);
                    const angle = (j / 5) * Math.PI * 2;
                    petal.position.set(Math.cos(angle) * 0.08, 0.3, Math.sin(angle) * 0.08);
                    petal.scale.y = 0.5;
                    flowerGroup.add(petal);
                }
                
                // 花心
                const centerGeo = new THREE.SphereGeometry(0.05, 6, 6);
                const centerMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
                const center = new THREE.Mesh(centerGeo, centerMat);
                center.position.y = 0.3;
                flowerGroup.add(center);
                
                flowerGroup.position.x = (Math.random() - 0.5) * 160;
                flowerGroup.position.z = (Math.random() - 0.5) * 15;
                flowerGroup.rotation.y = Math.random() * Math.PI;
                
                scene.add(flowerGroup);
            }
        }
        
        function createMountains() {
            for (let i = 0; i < 8; i++) {
                const height = 20 + Math.random() * 25;
                const mountainGeo = new THREE.ConeGeometry(15 + Math.random() * 15, height, 4);
                const mountainMat = new THREE.MeshStandardMaterial({ 
                    color: 0x5a6b7c,
                    roughness: 0.9
                });
                const mountain = new THREE.Mesh(mountainGeo, mountainMat);
                mountain.position.set(
                    (Math.random() - 0.5) * 200,
                    height / 2 - 5,
                    -40 - Math.random() * 20
                );
                scene.add(mountain);
            }
        }
        
        function createTrees() {
            for (let i = 0; i < 25; i++) {
                const treeGroup = new THREE.Group();
                
                // 树干
                const trunkHeight = 2 + Math.random() * 1.5;
                const trunkGeo = new THREE.CylinderGeometry(0.15, 0.25, trunkHeight, 6);
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = trunkHeight / 2;
                trunk.castShadow = true;
                treeGroup.add(trunk);
                
                // 树冠
                const leavesColor = Math.random() > 0.3 ? 0x228b22 : 0x006400;
                const leavesGeo = new THREE.SphereGeometry(1.2 + Math.random() * 0.8, 8, 8);
                const leavesMat = new THREE.MeshStandardMaterial({ color: leavesColor });
                const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                leaves.position.y = trunkHeight + 0.8;
                leaves.castShadow = true;
                treeGroup.add(leaves);
                
                treeGroup.position.x = (Math.random() - 0.5) * 180;

                // 避免生成在起点附近

                    scene.add(treeGroup);
                }
            }
        }

        function createSword(level) {
            const config = weaponConfigs[level];
            const group = new THREE.Group();
            
            // 剑柄
            const handleGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.35, 8);
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
            const handle = new THREE.Mesh(handleGeo, handleMat);
            handle.position.y = -0.175;
            group.add(handle);
            
            // 护手 - 根据等级越来越华丽
            const guardSize = 0.2 + level * 0.04;
            const guardGeo = level >= 8 ? 
                new THREE.OctahedronGeometry(guardSize, 0) :
                level >= 5 ?
                new THREE.BoxGeometry(guardSize * 2, 0.08, guardSize) :
                new THREE.BoxGeometry(guardSize * 2, 0.06, 0.12);
            
            const guardMat = new THREE.MeshStandardMaterial({ 
                color: config.color,
                emissive: config.color,
                emissiveIntensity: config.glow,
                metalness: 0.9,
                roughness: 0.1
            });
            const guard = new THREE.Mesh(guardGeo, guardMat);
            group.add(guard);
            
            // 剑身 - 越来越长越来越帅
            const bladeLength = 0.8 + level * 0.15;
            const bladeWidth = 0.08 + level * 0.015;
            
            let bladeGeo;
            if (level >= 10) {
                // 终极武器：龙形剑身
                bladeGeo = new THREE.CylinderGeometry(bladeWidth * 0.3, bladeWidth, bladeLength, 6);
            } else if (level >= 7) {
                // 高级武器：波浪形剑身
                bladeGeo = new THREE.BoxGeometry(bladeWidth, bladeLength, 0.04);
            } else {
                bladeGeo = new THREE.BoxGeometry(bladeWidth, bladeLength, 0.03);
            }
            
            const bladeMat = new THREE.MeshStandardMaterial({
                color: config.color,
                emissive: config.color,
                emissiveIntensity: config.glow,
                metalness: 0.95,
                roughness: 0.05
            });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.position.y = bladeLength / 2;
            group.add(blade);
            
            // 剑尖
            const tipGeo = new THREE.ConeGeometry(bladeWidth / 2, 0.2, 4);
            const tip = new THREE.Mesh(tipGeo, bladeMat);
            tip.position.y = bladeLength + 0.1;
            group.add(tip);
            
            // 特效粒子系统
            if (config.particleCount > 0) {
                const particleGeo = new THREE.BufferGeometry();
                const positions = new Float32Array(config.particleCount * 3);
                const velocities = [];
                
                for (let i = 0; i < config.particleCount; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * bladeWidth;
                    positions[i * 3 + 1] = Math.random() * bladeLength;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
                    
                    velocities.push({
                        x: (Math.random() - 0.5) * 0.02,
                        y: Math.random() * 0.02,
                        z: (Math.random() - 0.5) * 0.02
                    });
                }
                
                particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const particleMat = new THREE.PointsMaterial({
                    color: config.color,
                    size: 0.06 + level * 0.01,
                    transparent: true,
                    opacity: 0.9,
                    blending: THREE.AdditiveBlending
                });
                const particleSystem = new THREE.Points(particleGeo, particleMat);
                particleSystem.name = 'particles';
                particleSystem.userData = { velocities };
                group.add(particleSystem);
            }
            
            // 光晕
            if (config.glow > 0) {
                const light = new THREE.PointLight(config.color, config.glow, 3 + level * 0.5);
                light.position.y = bladeLength / 2;
                light.name = 'swordLight';
                group.add(light);
            }
            
            // 高级武器的额外装饰
            if (level >= 6) {
                // 环绕的符文环
                const ringGeo = new THREE.TorusGeometry(0.3, 0.02, 8, 32);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: config.color,
                    transparent: true,
                    opacity: 0.6
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.y = bladeLength * 0.3;
                ring.rotation.x = Math.PI / 2;
                ring.name = 'runeRing';
                group.add(ring);
            }
            
            if (level >= 9) {
                // 第二个光环
                const ring2Geo = new THREE.TorusGeometry(0.4, 0.015, 8, 32);
                const ring2Mat = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.4
                });
                const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
                ring2.position.y = bladeLength * 0.6;
                ring2.rotation.x = Math.PI / 2;
                ring2.name = 'runeRing2';
                group.add(ring2);
            }
            
            return group;
        }
        
        // ==================== 关卡生成 ====================
        function generateLevel(level) {
            // 清除旧敌人
            enemies.forEach(e => {
                scene.remove(e.mesh);
                if (e.label) e.label.remove();
            });
            enemies = [];
            
            const levelLength = 60 + level * 30;
            
            // 生成大量敌人 - 分布在整个草原
            const enemyCount = 12 + level * 8;
            const enemyNames = Object.keys(enemyTypes);
            
            for (let i = 0; i < enemyCount; i++) {
                // 根据关卡解锁更强敌人
                let availableEnemies = enemyNames.slice(0, Math.min(4 + level, enemyNames.length));
                const name = availableEnemies[Math.floor(Math.random() * availableEnemies.length)];
                
                const x = 15 + Math.random() * (levelLength - 20);

                new THREE.CylinderGeometry(0.5, 0.5, 6, 8),
                new THREE.MeshBasicMaterial({
                    color: 0xffd700,
                    transparent: true,
                    opacity: 0.3
                })
            );
            endMarker.position.set(levelLength, 3, 0);
            endMarker.name = 'endMarker';
            scene.add(endMarker);

        // ==================== 更新逻辑 ====================
        function updatePlayer(deltaTime) {
            if (!player) return;
            
            const speed = isCrouching ? 0.1 : 0.18;
            const jumpPower = 0.32;
            
            // 移动
            let moveX = 0;
            if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
            if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;
            
            // 下蹲
            isCrouching = keys['KeyC'] || keys['ArrowDown'];
            
            // 应用移动
            playerVelocity.x = moveX * speed;
            
            // 跳跃
            if ((keys['Space'] || keys['ArrowUp']) && !isJumping) {
                playerVelocity.y = jumpPower;
                isJumping = true;
                createJumpEffect(player.position);
            }
            
            // 重力
            playerVelocity.y -= 0.012;
            
            // 应用速度
            player.position.add(playerVelocity);
            
            // 地面限制 - 不会掉下去
            if (player.position.y < 0.5) {
                player.position.y = 0.5;
                playerVelocity.y = 0;
                isJumping = false;
            }
            
            // Z轴限制 - 保持在草原上
            player.position.z = Math.max(-8, Math.min(8, player.position.z));
            
            // 下蹲动画
            const targetScaleY = isCrouching ? 0.65 : 1;
            player.scale.y += (targetScaleY - player.scale.y) * 0.2;
            
            // 行走动画
            if (moveX !== 0 && !isJumping) {
                const animSpeed = isCrouching ? 6 : 10;
                const time = Date.now() * 0.001;
                player.userData.leftLeg.rotation.x = Math.sin(time * animSpeed) * 0.4;
                player.userData.rightLeg.rotation.x = -Math.sin(time * animSpeed) * 0.4;
                player.userData.leftArm.rotation.x = -Math.sin(time * animSpeed) * 0.25;
                
                // 持剑手臂
                if (!isAttacking) {
                    player.userData.rightArm.rotation.x = Math.sin(time * animSpeed) * 0.25;
                    player.userData.rightArm.rotation.z = -0.3 + Math.sin(time * animSpeed * 2) * 0.05;
                }
                
                // 头像轻微晃动
                const face = player.getObjectByName('face');
                if (face) {
                    face.position.y = 1.35 + Math.sin(time * animSpeed * 2) * 0.01;
                }
            } else {
                player.userData.leftLeg.rotation.x *= 0.8;
                player.userData.rightLeg.rotation.x *= 0.8;
                player.userData.leftArm.rotation.x *= 0.8;
                if (!isAttacking) {
                    player.userData.rightArm.rotation.x *= 0.8;
                    player.userData.rightArm.rotation.z += (-0.3 - player.userData.rightArm.rotation.z) * 0.1;
                }
            }
            
            // 转向
            if (moveX > 0) {
                player.rotation.y = 0;
                const face = player.getObjectByName('face');
                if (face) face.rotation.y = 0;
            }
            if (moveX < 0) {
                player.rotation.y = Math.PI;
                const face = player.getObjectByName('face');
                if (face) face.rotation.y = Math.PI;
            }
            
            // 攻击冷却
            if (isAttacking) {
                const attackDuration = 250;
                if (Date.now() - attackStartTime > attackDuration) {
                    isAttacking = false;
                }
            }
            
            // 剑动画和特效
            updateSwordAnimation();
            
            // 无敌时间递减
            if (invincibleTime > 0) invincibleTime -= deltaTime;
            
            // 头像发光动画
            const headGlow = player.getObjectByName('headGlow');
            if (headGlow) {
                headGlow.rotation.z += 0.02;
                headGlow.material.opacity = 0.2 + Math.sin(Date.now() * 0.003) * 0.15;
            }
            
            // 连击计时
            if (comboTimer > 0) {
                comboTimer -= deltaTime;
                if (comboTimer <= 0) comboCount = 0;
            }
        }
        
        function updateSwordAnimation() {
            if (!sword) return;
            
            const config = weaponConfigs[weaponLevel];
            const baseRot = -Math.PI / 4;
            
            if (isAttacking) {
                const progress = (Date.now() - attackStartTime) / 250;
                const swing = Math.sin(progress * Math.PI);
                sword.rotation.z = baseRot + swing * 2.5;
                sword.rotation.x = swing * 0.8;
            } else {
                sword.rotation.z += (baseRot - sword.rotation.z) * 0.2;
                sword.rotation.x *= 0.8;
            }
            
            // 粒子动画
            const particleSystem = sword.getObjectByName('particles');
            if (particleSystem) {
                const positions = particleSystem.geometry.attributes.position.array;
                const velocities = particleSystem.userData.velocities;
                
                for (let i = 0; i < velocities.length; i++) {
                    positions[i * 3] += velocities[i].x;
                    positions[i * 3 + 1] += velocities[i].y;
                    positions[i * 3 + 2] += velocities[i].z;
                    
                    // 重置超出范围的粒子
                    if (positions[i * 3 + 1] > 2 || Math.abs(positions[i * 3]) > 0.5) {
                        positions[i * 3] = (Math.random() - 0.5) * 0.2;
                        positions[i * 3 + 1] = Math.random() * 0.5;
                        positions[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
                    }
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            }
            
            // 符文环旋转
            const runeRing = sword.getObjectByName('runeRing');
            if (runeRing) {
                runeRing.rotation.z += 0.05;
                runeRing.rotation.y += 0.03;
            }
            
            const runeRing2 = sword.getObjectByName('runeRing2');
            if (runeRing2) {
                runeRing2.rotation.z -= 0.04;
                runeRing2.rotation.x += 0.02;
            }
            
            // 终极武器特殊效果
            if (config.ultimate) {
                sword.rotation.y += 0.01;
            }
        }
        
        function updateCamera() {
            if (!player) return;
            
            const targetPos = player.position.clone().add(cameraOffset);
            targetPos.x += 2; // 稍微偏右，显示更多前方
            camera.position.lerp(targetPos, 0.08);
            camera.lookAt(player.position.x + 5, player.position.y + 0.5, player.position.z);
        }
        
        function updateEnemies(deltaTime) {
            const now = Date.now();
            
            enemies.forEach((enemy, index) => {
                if (enemy.health <= 0) return;
                
                const dx = player.position.x - enemy.mesh.position.x;
                const dy = player.position.y - enemy.mesh.position.y;
                const dz = player.position.z - enemy.mesh.position.z;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                
                // AI移动
                if (dist > 1.2 && dist < 20) {
                    enemy.mesh.position.x += (dx / dist) * enemy.speed;
                    enemy.mesh.position.z += (dz / dist) * enemy.speed * 0.5;
                    enemy.mesh.lookAt(player.position.x, enemy.mesh.position.y, player.position.z);
                }
                
                // 攻击玩家
                if (dist < 1.3 && now - enemy.lastAttack > 1200 && invincibleTime <= 0) {
                    playerHealth -= enemy.damage;
                    enemy.lastAttack = now;
                    invincibleTime = 1000; // 1秒无敌时间
                    showDamageEffect();
                    createHitEffect(player.position, 0xff0000);
                    
                    // 击退
                    playerVelocity.x += (player.position.x - enemy.mesh.position.x) * 0.15;
                    playerVelocity.y = 0.1;
                    
                    if (playerHealth <= 0) gameOver(`被${enemy.name}击败了...`);
                }
                
                // 受击闪烁
                if (enemy.hitFlash > 0) {
                    enemy.hitFlash--;
                    enemy.mesh.children.forEach(child => {
                        if (child.material && child.material.emissive) {
                            child.material.emissive.setHex(0xff0000);
                            child.material.emissiveIntensity = 0.5;
                        }
                    });
                } else {
                    enemy.mesh.children.forEach(child => {
                        if (child.material && child.material.emissive) {
                            child.material.emissive.setHex(0);
                        }
                    });
                }
                
                // 更新血条
                if (enemy.hpBar) {
                    const hpPercent = enemy.health / enemy.maxHealth;
                    enemy.hpBar.scale.x = hpPercent;
                    enemy.hpBar.position.x = -0.29 * (1 - hpPercent);
                }
                
                // 更新标签位置
                updateEnemyLabel(enemy);
            });
            
            // 清理死亡敌人
            enemies = enemies.filter(enemy => {
                if (enemy.health <= 0) {
                    scene.remove(enemy.mesh);
                    if (enemy.label) enemy.label.remove();
                    
                    // 获得经验值
                    exp += enemy.exp;
                    kills++;
                    score += 50 * weaponLevel + enemy.exp * 20;
                    
                    // 检查升级
                    checkLevelUp();
                    
                    // 死亡特效
                    createExplosion(enemy.mesh.position, enemyTypes[enemy.name].color);
                    
                    return false;
                }
                return true;
            });
            
            // 检查是否到达终点
            const endBase = scene.children.find(c => c.userData && c.userData.isEnd);
            if (endBase) {
                const distToEnd = Math.abs(player.position.x - endBase.position.x);
                if (distToEnd < 3 && Math.abs(player.position.z) < 3) {
                    if (currentLevel >= 3) {
                        victory();
                    } else {
                        levelComplete();
                    }
                }
            }
        }
        
        function checkLevelUp() {
            if (exp >= expToNext && weaponLevel < 10) {
                weaponLevel++;
                exp = 0;
                expToNext = Math.min(3 + weaponLevel, 8); // 升级所需经验递增
                
                // 升级特效
                createLevelUpEffect();
                showWeaponUpgradePopup();
                
                // 恢复生命
                playerHealth = Math.min(playerHealth + 30, maxHealth);
                
                // 更新剑
                if (player) {
                    const oldSword = player.getObjectByName('sword');
                    if (oldSword) {
                        player.remove(oldSword);
                    }
                    
                    sword = createSword(weaponLevel);
                    sword.position.set(0.5, 0.6, 0.4);
                    sword.rotation.z = -Math.PI / 4;
                    sword.name = 'sword';
                    player.add(sword);
                    
                    // 更新玩家发光
                    const glow = player.getObjectByName('playerGlow');
                    if (glow) {
                        glow.material.color.setHex(weaponConfigs[weaponLevel].color);
                    }
                }
            }
        }
        
        function updateEnemyLabel(enemy) {
            if (!enemy.label) return;
            
            const vector = enemy.mesh.position.clone();
            vector.y += 1.4;
            vector.project(camera);
            
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;
            
            if (vector.z < 1) {
                enemy.label.style.left = x + 'px';
                enemy.label.style.top = y + 'px';
                enemy.label.style.display = 'block';
            } else {
                enemy.label.style.display = 'none';
            }
        }
        
        function updateEnvironment() {
            // 草叶摆动
            const time = Date.now() * 0.001;
            grassBlades.forEach(grass => {
                grass.mesh.rotation.z = grass.baseRotation + Math.sin(time * grass.swaySpeed) * grass.swayAmount;
            });
            
            // 云朵飘动
            clouds.forEach(cloud => {
                cloud.mesh.position.x += cloud.speed;
                if (cloud.mesh.position.x > 100) {
                    cloud.mesh.position.x = -100;
                }
            });
            
            // 环境粒子
            particles.forEach(p => {
                p.rotation.y += 0.0005;
                const positions = p.geometry.attributes.position.array;
                for (let i = 1; i < positions.length; i += 3) {
                    positions[i] += Math.sin(time + positions[i-1]) * 0.01;
                    if (positions[i] > 15) positions[i] = 0;
                }
                p.geometry.attributes.position.needsUpdate = true;
            });
        }
        
        // ==================== 攻击系统 ====================
        let attackStartTime = 0;
        
        function attack() {
            if (!gameRunning || isAttacking || !player) return;
            
            isAttacking = true;
            attackStartTime = Date.now();
            
            const config = weaponConfigs[weaponLevel];
            
            // 攻击特效 - 根据武器等级越来越帅
            createAttackEffect(config);
            
            // 检测命中
            let hitCount = 0;
            enemies.forEach(enemy => {
                if (enemy.health <= 0) return;
                
                const dx = enemy.mesh.position.x - player.position.x;
                const dz = enemy.mesh.position.z - player.position.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                
                if (dist < config.range) {
                    // 检查方向
                    const angle = Math.atan2(dz, dx);
                    const playerAngle = player.rotation.y === 0 ? 0 : Math.PI;
                    let angleDiff = Math.abs(angle - playerAngle);
                    if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;
                    
                    if (angleDiff < Math.PI / 1.8) {
                        enemy.health -= config.damage;
                        enemy.hitFlash = 5;
                        hitCount++;
                        
                        // 击退
                        const knockback = 0.3 + weaponLevel * 0.1;
                        enemy.mesh.position.x += dx / dist * knockback;
                        enemy.mesh.position.z += dz / dist * knockback;
                        
                        // 受击特效
                        createHitEffect(enemy.mesh.position, config.color, weaponLevel);
                        
                        // 连击
                        comboCount++;
                        comboTimer = 2500;
                        
                        if (comboCount > 1 && comboCount % 5 === 0) {
                            score += comboCount * 5;
                            showComboText(comboCount);
                        }
                    }
                }
            });
            
            if (hitCount > 0) {
                score += config.damage * hitCount;
            }
            
            updateUI();
        }
        
        // ==================== 特效系统 ====================
        function createJumpEffect(pos) {
            for (let i = 0; i < 10; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.06, 6, 6),
                    new THREE.MeshBasicMaterial({ 
                        color: 0x88ff88, 
                        transparent: true,
                        opacity: 0.8
                    })
                );
                particle.position.copy(pos);
                particle.position.y = 0.3;
                particle.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.3,
                    Math.random() * 0.25,
                    (Math.random() - 0.5) * 0.3
                );
                scene.add(particle);
                
                let life = 40;
                const anim = () => {
                    particle.position.add(particle.velocity);
                    particle.velocity.y -= 0.008;
                    particle.scale.multiplyScalar(0.95);
                    life--;
                    if (life > 0) requestAnimationFrame(anim);
                    else scene.remove(particle);
                };
                anim();
            }
        }
        
        function createHitEffect(pos, color, level = 1) {
            const count = 5 + level * 2;
            
            for (let i = 0; i < count; i++) {
                const size = 0.08 + Math.random() * 0.08;
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(size, 6, 6),
                    new THREE.MeshBasicMaterial({ color: color })
                );
                particle.position.copy(pos);
                particle.position.x += (Math.random() - 0.5) * 0.6;
                particle.position.y += (Math.random() - 0.5) * 0.6 + 0.5;
                particle.position.z += (Math.random() - 0.5) * 0.6;
                scene.add(particle);
                
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.15,
                    Math.random() * 0.15,
                    (Math.random() - 0.5) * 0.15
                );
                
                let life = 25 + level * 3;
                const anim = () => {
                    particle.position.add(velocity);
                    velocity.y -= 0.005;
                    particle.scale.multiplyScalar(0.92);
                    life--;
                    if (life > 0) requestAnimationFrame(anim);
                    else scene.remove(particle);
                };
                anim();
            }
            
            // 高级武器额外特效
            if (level >= 5) {
                // 冲击波
                const shockwaveGeo = new THREE.RingGeometry(0.1, 0.3, 16);
                const shockwaveMat = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.6,
                    side: THREE.DoubleSide
                });
                const shockwave = new THREE.Mesh(shockwaveGeo, shockwaveMat);
                shockwave.position.copy(pos);
                shockwave.position.y = 0.1;
                shockwave.rotation.x = -Math.PI / 2;
                scene.add(shockwave);
                
                let scale = 1;
                const waveAnim = () => {
                    scale += 0.15;
                    shockwave.scale.set(scale, scale, scale);
                    shockwave.material.opacity -= 0.03;
                    if (shockwave.material.opacity > 0) requestAnimationFrame(waveAnim);
                    else scene.remove(shockwave);
                };
                waveAnim();
            }
        }
        
        function createExplosion(pos, color, scale = 1) {
            const count = 20 * scale;
            
            for (let i = 0; i < count; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08 * scale, 6, 6),
                    new THREE.MeshBasicMaterial({ color: color })
                );
                particle.position.copy(pos);
                particle.position.y += 0.5;
                
                const angle = (Math.random() * Math.PI * 2);
                const speed = 0.1 + Math.random() * 0.2;
                const velocity = new THREE.Vector3(
                    Math.cos(angle) * speed,
                    Math.random() * 0.3,
                    Math.sin(angle) * speed
                );
                
                scene.add(particle);
                
                let life = 40;
                const anim = () => {
                    particle.position.add(velocity);
                    velocity.y -= 0.01;
                    velocity.x *= 0.98;
                    velocity.z *= 0.98;
                    particle.scale.multiplyScalar(0.96);
                    life--;
                    if (life > 0) requestAnimationFrame(anim);
                    else scene.remove(particle);
                };
                anim();
            }
        }
        
        function createAttackEffect(config) {
            // 剑气
            const slashCount = config.spin ? 3 : 1;
            
            for (let i = 0; i < slashCount; i++) {
                setTimeout(() => {
                    const slashGeo = new THREE.RingGeometry(0.5, 1.2, 0, Math.PI * 1.2);
                    const slashMat = new THREE.MeshBasicMaterial({
                        color: config.color,
                        transparent: true,
                        opacity: 0.7,
                        side: THREE.DoubleSide
                    });
                    const slash = new THREE.Mesh(slashGeo, slashMat);
                    
                    slash.position.copy(player.position);
                    slash.position.y += 0.8;
                    slash.position.x += (player.rotation.y === 0 ? 0.5 : -0.5);
                    slash.rotation.x = -Math.PI / 2;
                    slash.rotation.z = player.rotation.y === 0 ? -Math.PI / 4 : Math.PI * 0.75;
                    
                    scene.add(slash);
                    
                    let scale = 1;
                    const speed = 0.3 + config.glow * 0.2;
                    const anim = () => {
                        scale += speed;
                        slash.scale.set(scale, scale, scale);
                        slash.material.opacity -= 0.025;
                        
                        // 高级武器剑气飞行
                        if (config.level >= 7) {
                            slash.position.x += (player.rotation.y === 0 ? 0.1 : -0.1);
                        }
                        
                        if (slash.material.opacity > 0) requestAnimationFrame(anim);
                        else scene.remove(slash);
                    };
                    anim();
                }, i * 100);
            }
            
            // 终极武器全屏特效
            if (config.ultimate) {
                const flash = new THREE.Mesh(
                    new THREE.PlaneGeometry(50, 30),
                    new THREE.MeshBasicMaterial({
                        color: config.color,
                        transparent: true,
                        opacity: 0.3
                    })
                );
                flash.position.copy(player.position);
                flash.position.y += 5;
                flash.position.z = 5;
                scene.add(flash);
                
                let opacity = 0.3;
                const flashAnim = () => {
                    opacity -= 0.02;
                    flash.material.opacity = opacity;
                    if (opacity > 0) requestAnimationFrame(flashAnim);
                    else scene.remove(flash);
                };
                flashAnim();
            }
        }
        
        function createLevelUpEffect() {
            // 升级光环
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const ringGeo = new THREE.RingGeometry(0.5 + i * 0.3, 0.8 + i * 0.3, 32);
                    const ringMat = new THREE.MeshBasicMaterial({
                        color: weaponConfigs[weaponLevel].color,
                        transparent: true,
                        opacity: 0.8,
                        side: THREE.DoubleSide
                    });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.position.copy(player.position);
                    ring.position.y += 1;
                    ring.rotation.x = -Math.PI / 2;
                    scene.add(ring);
                    
                    let scale = 1;
                    const anim = () => {
                        scale += 0.1;
                        ring.scale.set(scale, scale, scale);
                        ring.material.opacity -= 0.02;
                        ring.position.y += 0.05;
                        if (ring.material.opacity > 0) requestAnimationFrame(anim);
                        else scene.remove(ring);
                    };
                    anim();
                }, i * 200);
            }
            
            // 金色粒子爆发
            for (let i = 0; i < 30; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 6, 6),
                    new THREE.MeshBasicMaterial({ color: 0xffd700 })
                );
                particle.position.copy(player.position);
                particle.position.y += 1;
                
                const angle = (i / 30) * Math.PI * 2;
                const velocity = new THREE.Vector3(
                    Math.cos(angle) * 0.2,
                    0.3 + Math.random() * 0.2,
                    Math.sin(angle) * 0.2
                );
                
                scene.add(particle);
                
                let life = 50;
                const anim = () => {
                    particle.position.add(velocity);
                    velocity.y -= 0.01;
                    particle.scale.multiplyScalar(0.97);
                    life--;
                    if (life > 0) requestAnimationFrame(anim);
                    else scene.remove(particle);
                };
                anim();
            }
        }
        
        function showWeaponUpgradePopup() {
            const popup = document.createElement('div');
            popup.className = 'weaponUpgradePopup';
            popup.innerHTML = `✨ 武器升级!<br>${weaponConfigs[weaponLevel].name}`;
            document.getElementById('ui').appendChild(popup);
            setTimeout(() => popup.remove(), 2000);
        }
        
        function showDamageEffect() {
            const overlay = document.getElementById('damageOverlay');
            overlay.style.opacity = '1';
            setTimeout(() => overlay.style.opacity = '0', 150);
        }
        
        function showComboText(combo) {
            const div = document.createElement('div');
            div.style.cssText = `
                position: absolute;
                left: 50%;
                top: 35%;
                transform: translate(-50%, -50%);
                color: #ff0;
                font-size: 36px;
                font-weight: bold;
                text-shadow: 2px 2px 4px #f00, 0 0 20px #ff0;
                pointer-events: none;
                animation: comboAnim 1.2s ease-out forwards;
            `;
            div.textContent = `${combo} 连击! 🔥`;
            document.getElementById('ui').appendChild(div);
            setTimeout(() => div.remove(), 1200);
        }
        
        // ==================== UI更新 ====================
        function updateUI() {
            document.getElementById('healthFill').style.width = (playerHealth / maxHealth * 100) + '%';
            document.getElementById('expFill').style.width = (exp / expToNext * 100) + '%';
            document.getElementById('score').textContent = score;
            document.getElementById('kills').textContent = kills;
            
            const levelNames = ['', '草原启程', '森林深处', '终极决战'];
            document.getElementById('levelInfo').textContent = `第 ${currentLevel} 关 - ${levelNames[currentLevel]}`;
            document.getElementById('weaponInfo').textContent = 
                `${weaponConfigs[weaponLevel].name} (伤害:${weaponConfigs[weaponLevel].damage})`;
        }
        
        // ==================== 事件处理 ====================
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function onMouseDown(e) {
            if (e.button === 0) attack();
        }
        
        // ==================== 主循环 ====================
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            if (gameRunning) {
                updatePlayer(16);
                updateEnemies(16);
                updateEnvironment();
                updateCamera();
                updateUI();
            }
            
            renderer.render(scene, camera);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
