<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>翠翠大冒险 - CuiCui Adventure</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: #87ceeb;
        font-family: 'Microsoft YaHei', sans-serif;
        touch-action: none;
      }

      #gameCanvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #healthBar {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 220px;
        height: 28px;
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }

      #healthFill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ff4444, #ff8844, #ffaa44);
        transition: width 0.3s;
        border-radius: 12px;
      }

      #scoreBoard {
        position: absolute;
        top: 20px;
        right: 20px;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        font-size: 18px;
        text-align: right;
      }

      #levelInfo {
        position: absolute;
        top: 60px;
        left: 20px;
        color: #ffd700;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        font-size: 20px;
        font-weight: bold;
      }

      #weaponInfo {
        position: absolute;
        top: 95px;
        left: 20px;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        font-size: 15px;
        background: linear-gradient(
          135deg,
          rgba(0, 0, 0, 0.6),
          rgba(50, 50, 100, 0.4)
        );
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      #startScreen,
      #gameOverScreen,
      #levelCompleteScreen,
      #victoryScreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        pointer-events: auto;
        z-index: 100;
      }

      #gameOverScreen,
      #levelCompleteScreen,
      #victoryScreen {
        display: none;
      }

      .title {
        font-size: 48px;
        color: #ffd700;
        text-shadow:
          0 0 20px #ff6b6b,
          0 0 40px #ff6b6b;
        margin-bottom: 20px;
        animation: glow 2s ease-in-out infinite;
      }

      @keyframes glow {
        0%,
        100% {
          text-shadow:
            0 0 20px #ff6b6b,
            0 0 40px #ff6b6b;
        }
        50% {
          text-shadow:
            0 0 30px #ffd700,
            0 0 60px #ffd700;
        }
      }

      @keyframes levelUpAnim {
        0% {
          transform: translate(-50%, -50%) scale(0.5);
          opacity: 0;
        }
        20% {
          transform: translate(-50%, -50%) scale(1.2);
          opacity: 1;
        }
        80% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(1.5);
          opacity: 0;
        }
      }

      @keyframes comboAnim {
        0% {
          transform: translate(-50%, -50%) scale(0.5);
          opacity: 0;
        }
        30% {
          transform: translate(-50%, -50%) scale(1.3);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -100%) scale(1);
          opacity: 0;
        }
      }

      .subtitle {
        font-size: 20px;
        color: #fff;
        margin-bottom: 30px;
        text-align: center;
        max-width: 600px;
        line-height: 1.6;
      }

      .btn {
        padding: 15px 40px;
        font-size: 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin: 10px;
      }

      .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(102, 126, 234, 0.6);
      }

      #controls {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        line-height: 1.8;
      }

      /* 移动端控制按钮 */
      #mobileControls {
        position: absolute;
        bottom: 20px;
        width: 100%;
        display: none;
        pointer-events: auto;
        padding: 0 20px;
      }

      .controlRow {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 10px;
      }

      .controlBtn {
        width: 60px;
        height: 60px;
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        color: #fff;
        font-size: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        touch-action: manipulation;
      }

      .controlBtn:active {
        background: rgba(255, 255, 255, 0.4);
      }

      .controlBtn.large {
        width: 80px;
        height: 80px;
        font-size: 32px;
        background: rgba(255, 100, 100, 0.3);
      }

      .controlBtn.attack {
        background: rgba(255, 200, 50, 0.4);
      }

      .dPad {
        display: flex;
        gap: 10px;
      }

      #damageOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          transparent 30%,
          rgba(255, 0, 0, 0.3) 100%
        );
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }

      .enemyLabel {
        position: absolute;
        color: #ff6b6b;
        font-size: 14px;
        font-weight: bold;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        transform: translate(-50%, -100%);
      }

      @media (max-width: 768px) {
        .title {
          font-size: 32px;
        }
        .subtitle {
          font-size: 14px;
          padding: 0 20px;
        }
        #controls {
          display: none;
        }
        #mobileControls {
          display: block;
        }
        #scoreBoard {
          font-size: 14px;
        }
        #levelInfo {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
      <div id="healthBar">
        <div id="healthFill"></div>
      </div>
      <div id="levelInfo">准备开始...</div>
      <div id="weaponInfo">🗡️ 木剑 Lv.1</div>
      <div id="scoreBoard">
        分数: <span id="score">0</span><br />
        击杀: <span id="kills">0</span>
      </div>
      <div id="controls">
        WASD / 方向键: 移动<br />
        空格: 跳跃<br />
        J / 点击: 攻击
      </div>
    </div>

    <div id="mobileControls">
      <div class="controlRow">
        <div class="dPad">
          <div class="controlBtn" id="btnLeft">←</div>
          <div class="controlBtn" id="btnRight">→</div>
        </div>
        <div class="controlBtn large" id="btnJump">↑</div>
        <div class="controlBtn large attack" id="btnAttack">⚔️</div>
      </div>
    </div>

    <div id="damageOverlay"></div>

    <div id="startScreen">
      <h1 class="title">🌿 翠翠草原大冒险</h1>
      <p class="subtitle">
        翠翠获得了一把星光剑！<br />
        击败二叔、二婶、嘉姐、万总等怪物<br />
        升级武器，挑战十关！<br />
        <br />
        ⚔️ 初始武器已有剑气效果！
      </p>
      <button class="btn" onclick="startGame()">开始冒险</button>
    </div>

    <div id="gameOverScreen">
      <h1 class="title">💀 游戏结束</h1>
      <p class="subtitle" id="gameOverText"></p>
      <button class="btn" onclick="restartGame()">重新开始</button>
    </div>

    <div id="levelCompleteScreen">
      <h1 class="title">🎉 关卡完成！</h1>
      <p class="subtitle" id="levelCompleteText"></p>
      <button class="btn" onclick="nextLevel()">下一关</button>
    </div>

    <div id="victoryScreen">
      <h1 class="title">🏆 通关大吉！</h1>
      <p class="subtitle" id="victoryText"></p>
      <button class="btn" onclick="restartGame()">再玩一次</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      // ==================== 游戏全局变量 ====================
      let scene, camera, renderer
      let player,
        playerVelocity = new THREE.Vector3()
      let isJumping = false,
        isAttacking = false
      let platforms = [],
        enemies = [],
        particles = []
      let weaponLevel = 1,
        score = 0,
        kills = 0,
        currentLevel = 1
      let playerHealth = 100,
        maxHealth = 100
      let gameRunning = false
      let cameraOffset = new THREE.Vector3(0, 8, 15)
      let enemyLabels = []
      let animationId
      let keys = {}
      let mouse = new THREE.Vector2()
      let raycaster = new THREE.Raycaster()
      let sword,
        swordTrail = []
      let comboCount = 0,
        comboTimer = 0

      // 武器配置 - 10个等级，都有剑气效果
      const weaponConfigs = {
        1: {
          name: '⚔️ 星光剑',
          color: 0x88ccff,
          damage: 30,
          range: 4,
          glow: 0.3,
          effect: 'star',
          trail: true,
        },
        2: {
          name: '🔥 烈焰剑',
          color: 0xff4400,
          damage: 40,
          range: 4.2,
          glow: 0.4,
          effect: 'fire',
          trail: true,
        },
        3: {
          name: '⚡ 雷霆剑',
          color: 0x00aaff,
          damage: 52,
          range: 4.5,
          glow: 0.5,
          effect: 'lightning',
          trail: true,
        },
        4: {
          name: '❄️ 寒冰剑',
          color: 0x00ffff,
          damage: 65,
          range: 4.8,
          glow: 0.6,
          effect: 'ice',
          trail: true,
        },
        5: {
          name: '🌿 毒藤剑',
          color: 0x00ff00,
          damage: 80,
          range: 5,
          glow: 0.7,
          effect: 'poison',
          trail: true,
        },
        6: {
          name: '💎 水晶剑',
          color: 0xff00ff,
          damage: 98,
          range: 5.2,
          glow: 0.8,
          effect: 'crystal',
          trail: true,
        },
        7: {
          name: '🌟 星辰剑',
          color: 0xffff00,
          damage: 118,
          range: 5.5,
          glow: 0.85,
          effect: 'star',
          trail: true,
        },
        8: {
          name: '💀 暗黑剑',
          color: 0x660066,
          damage: 140,
          range: 5.8,
          glow: 0.9,
          effect: 'dark',
          trail: true,
        },
        9: {
          name: '🌈 彩虹剑',
          color: 0xff69b4,
          damage: 170,
          range: 6,
          glow: 0.95,
          effect: 'rainbow',
          trail: true,
        },
        10: {
          name: '👑 传说圣剑',
          color: 0xffd700,
          damage: 200,
          range: 6.5,
          glow: 1.0,
          effect: 'holy',
          trail: true,
        },
      }

      // 敌人配置
      const enemyTypes = {
        二叔: {
          color: 0x4a5568,
          health: 60,
          damage: 10,
          speed: 0.03,
          scale: 1.2,
        },
        二婶: {
          color: 0xe53e3e,
          health: 50,
          damage: 12,
          speed: 0.04,
          scale: 1.0,
        },
        嘉姐: {
          color: 0x805ad5,
          health: 80,
          damage: 15,
          speed: 0.05,
          scale: 1.1,
        },
        万总: {
          color: 0x38a169,
          health: 150,
          damage: 20,
          speed: 0.02,
          scale: 1.4,
        },
      }

      // ==================== 初始化 ====================
      function init() {
        // 场景 - 草原背景
        scene = new THREE.Scene()
        scene.background = new THREE.Color(0x87ceeb) // 天空蓝
        scene.fog = new THREE.Fog(0x90ee90, 20, 80) // 草地绿雾

        // 相机
        camera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        )
        camera.position.copy(cameraOffset)

        // 渲染器
        renderer = new THREE.WebGLRenderer({
          canvas: document.getElementById('gameCanvas'),
          antialias: true,
          alpha: true,
        })
        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.shadowMap.enabled = true
        renderer.shadowMap.type = THREE.PCFSoftShadowMap
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))

        // 灯光 - 草原阳光效果
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8)
        scene.add(ambientLight)

        const dirLight = new THREE.DirectionalLight(0xffffcc, 1.0)
        dirLight.position.set(10, 20, 10)
        dirLight.castShadow = true
        dirLight.shadow.camera.left = -50
        dirLight.shadow.camera.right = 50
        dirLight.shadow.camera.top = 50
        dirLight.shadow.camera.bottom = -50
        dirLight.shadow.mapSize.width = 2048
        dirLight.shadow.mapSize.height = 2048
        scene.add(dirLight)

        // 事件监听
        window.addEventListener('resize', onWindowResize)
        document.addEventListener('keydown', (e) => (keys[e.code] = true))
        document.addEventListener('keyup', (e) => (keys[e.code] = false))
        document.addEventListener('mousedown', onMouseDown)
        document.addEventListener('touchstart', onTouchStart, {
          passive: false,
        })

        // 移动端控制
        setupMobileControls()

        // 开始渲染循环
        animate()
      }

      function setupMobileControls() {
        const btnLeft = document.getElementById('btnLeft')
        const btnRight = document.getElementById('btnRight')
        const btnJump = document.getElementById('btnJump')
        const btnAttack = document.getElementById('btnAttack')

        const addTouch = (btn, code) => {
          btn.addEventListener('touchstart', (e) => {
            e.preventDefault()
            keys[code] = true
          })
          btn.addEventListener('touchend', (e) => {
            e.preventDefault()
            keys[code] = false
          })
          btn.addEventListener('mousedown', () => (keys[code] = true))
          btn.addEventListener('mouseup', () => (keys[code] = false))
        }

        addTouch(btnLeft, 'ArrowLeft')
        addTouch(btnRight, 'ArrowRight')
        addTouch(btnJump, 'Space')
        btnAttack.addEventListener('touchstart', (e) => {
          e.preventDefault()
          attack()
        })
        btnAttack.addEventListener('mousedown', attack)
      }

      // ==================== 创建玩家 ====================
      function createPlayer() {
        const group = new THREE.Group()

        // 身体
        const bodyGeo = new THREE.CylinderGeometry(0.4, 0.3, 1.2, 8)
        const bodyMat = new THREE.MeshStandardMaterial({
          color: 0x4ade80, // 绿色衣服
          roughness: 0.3,
          metalness: 0.2,
        })
        const body = new THREE.Mesh(bodyGeo, bodyMat)
        body.position.y = 0.6
        body.castShadow = true
        group.add(body)

        // 头部 - 使用翠翠的2D图片Sprite，始终面向玩家
        const textureLoader = new THREE.TextureLoader()
        textureLoader.load(
          './cuicui.jpg',
          (texture) => {
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true })
            const head = new THREE.Sprite(material)
            head.scale.set(0.8, 0.8, 1)
            head.position.y = 1.4
            head.name = 'head'
            group.add(head)
          },
          undefined,
          () => {
            // 加载失败时使用默认头像
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac })
            const headGeo = new THREE.SphereGeometry(0.5, 16, 16)
            const head = new THREE.Mesh(headGeo, headMat)
            head.position.y = 1.4
            head.name = 'head'
            group.add(head)
          },
        )

        // 默认头像（等待图片加载）
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac })
        const headGeo = new THREE.SphereGeometry(0.5, 16, 16)
        const head = new THREE.Mesh(headGeo, headMat)
        head.position.y = 1.4
        head.name = 'head'
        group.add(head)

        // 手臂
        const armGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8)
        const leftArm = new THREE.Mesh(armGeo, bodyMat)
        leftArm.position.set(-0.5, 0.8, 0)
        leftArm.rotation.z = 0.3
        const rightArm = new THREE.Mesh(armGeo, bodyMat)
        rightArm.position.set(0.5, 0.8, 0)
        rightArm.rotation.z = -0.3
        group.add(leftArm, rightArm)

        // 腿
        const legGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.8, 8)
        const leftLeg = new THREE.Mesh(
          legGeo,
          new THREE.MeshStandardMaterial({ color: 0x2c3e50 }),
        )
        leftLeg.position.set(-0.2, 0, 0)
        const rightLeg = new THREE.Mesh(
          legGeo,
          new THREE.MeshStandardMaterial({ color: 0x2c3e50 }),
        )
        rightLeg.position.set(0.2, 0, 0)
        group.add(leftLeg, rightLeg)

        // 创建剑
        sword = createSword(weaponLevel)
        sword.position.set(0.6, 0.8, 0.5)
        sword.rotation.z = -Math.PI / 4
        group.add(sword)

        // 发光效果
        const glowGeo = new THREE.SphereGeometry(1.5, 16, 16)
        const glowMat = new THREE.MeshBasicMaterial({
          color: weaponConfigs[weaponLevel].color,
          transparent: true,
          opacity: 0.1,
        })
        const glow = new THREE.Mesh(glowGeo, glowMat)
        glow.position.y = 0.8
        glow.name = 'glow'
        group.add(glow)

        group.position.set(0, 1, 0)
        scene.add(group)

        player = group
        player.userData = {
          velocity: new THREE.Vector3(),
          leftArm,
          rightArm,
          leftLeg,
          rightLeg,
          head,
          glow,
        }
      }

      function createSword(level) {
        const config = weaponConfigs[level]
        const group = new THREE.Group()

        // 剑气光效（始终显示）
        const glowGeo = new THREE.SphereGeometry(0.6, 16, 16)
        const glowMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.3,
          side: THREE.DoubleSide,
        })
        const glow = new THREE.Mesh(glowGeo, glowMat)
        glow.position.y = 0.8
        glow.scale.set(1.5, 2, 0.5)
        group.add(glow)

        // 剑柄
        const handleGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.5, 8)
        const handleMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 })
        const handle = new THREE.Mesh(handleGeo, handleMat)
        handle.position.y = -0.25
        group.add(handle)

        // 护手
        const guardGeo = new THREE.BoxGeometry(0.5, 0.12, 0.2)
        const guardMat = new THREE.MeshStandardMaterial({
          color: config.color,
          emissive: config.color,
          emissiveIntensity: config.glow,
        })
        const guard = new THREE.Mesh(guardGeo, guardMat)
        group.add(guard)

        // 剑身 - 更大更帅
        const bladeLength = 1.2 + level * 0.2
        const bladeGeo = new THREE.BoxGeometry(0.18, bladeLength, 0.04)
        const bladeMat = new THREE.MeshStandardMaterial({
          color: config.color,
          emissive: config.color,
          emissiveIntensity: config.glow,
          metalness: 0.9,
          roughness: 0.1,
        })
        const blade = new THREE.Mesh(bladeGeo, bladeMat)
        blade.position.y = bladeLength / 2 + 0.1
        group.add(blade)

        // 剑气轨迹
        const trailGeo = new THREE.PlaneGeometry(
          0.3 + level * 0.05,
          bladeLength * 0.8,
        )
        const trailMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.4 + level * 0.03,
          side: THREE.DoubleSide,
        })
        const trail = new THREE.Mesh(trailGeo, trailMat)
        trail.position.y = bladeLength / 2 + 0.2
        trail.position.z = 0.05
        group.add(trail)

        // 特效粒子
        const particleGeo = new THREE.BufferGeometry()
        const particleCount = 15 + level * 5
        const positions = new Float32Array(particleCount * 3)
        for (let i = 0; i < particleCount * 3; i += 3) {
          positions[i] = (Math.random() - 0.5) * 0.4
          positions[i + 1] = Math.random() * bladeLength
          positions[i + 2] = (Math.random() - 0.5) * 0.15
        }
        particleGeo.setAttribute(
          'position',
          new THREE.BufferAttribute(positions, 3),
        )
        const particleMat = new THREE.PointsMaterial({
          color: config.color,
          size: 0.08 + level * 0.01,
          transparent: true,
          opacity: 0.9,
        })
        const particles = new THREE.Points(particleGeo, particleMat)
        group.add(particles)

        // 光晕
        const light = new THREE.PointLight(config.color, config.glow, 8 + level)
        light.position.y = bladeLength / 2
        group.add(light)

        return group
      }

      // ==================== 关卡生成 ====================
      function generateLevel(level) {
        // 清除旧关卡
        platforms.forEach((p) => scene.remove(p))
        enemies.forEach((e) => {
          scene.remove(e.mesh)
          if (e.label) e.label.remove()
        })
        platforms = []

        const levelLength = 60 + level * 25
        const groundY = 0

        // 草原地面
        const groundMat = new THREE.MeshStandardMaterial({
          color: 0x228b22,
          roughness: 0.9,
        })

        for (let x = -10; x < levelLength; x += 4) {
          const groundGeo = new THREE.BoxGeometry(4, 1, 20)
          const ground = new THREE.Mesh(groundGeo, groundMat)
          ground.position.set(x, groundY - 0.5, 0)
          ground.receiveShadow = true
          scene.add(ground)
          platforms.push(ground)

          // 草原装饰 - 花草
          if (Math.random() > 0.2) {
            const grassCount = 3 + Math.floor(Math.random() * 4)
            for (let i = 0; i < grassCount; i++) {
              const grassGeo = new THREE.ConeGeometry(
                0.08 + Math.random() * 0.1,
                0.4 + Math.random() * 0.3,
                4,
              )
              const grassColor =
                Math.random() > 0.3
                  ? 0x228b22
                  : Math.random() > 0.5
                    ? 0x90ee90
                    : 0xff69b4
              const grassMat = new THREE.MeshStandardMaterial({
                color: grassColor,
              })
              const grass = new THREE.Mesh(grassGeo, grassMat)
              grass.position.set(
                x + (Math.random() - 0.5) * 3,
                0.1,
                (Math.random() - 0.5) * 15,
              )
              grass.rotation.y = Math.random() * Math.PI
              scene.add(grass)
            }
          }

          // 随机树
          if (Math.random() > 0.85) {
            createTree(
              x + (Math.random() - 0.5) * 2,
              0,
              (Math.random() - 0.5) * 12,
            )
          }
        }

        // 生成敌人 - 根据关卡调整数量和强度
        const enemyCount = 5 + level * 2
        const enemyNames = Object.keys(enemyTypes)

        for (let i = 0; i < enemyCount; i++) {
          const name =
            enemyNames[
              Math.min(
                Math.floor(Math.random() * (level + 1)),
                enemyNames.length - 1,
              )
            ]
          const x = 15 + Math.random() * (levelLength - 30)
          const enemy = createEnemy(name, x, 1, (Math.random() - 0.5) * 8)
          // 关卡加成
          enemy.damage = Math.floor(enemy.damage * (1 + level * 0.1))
          enemies.push(enemy)
        }

        // 终点旗帜
        const flagPoleGeo = new THREE.CylinderGeometry(0.1, 0.1, 6, 8)
        const flagPoleMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 })
        const flagPole = new THREE.Mesh(flagPoleGeo, flagPoleMat)
        flagPole.position.set(levelLength, 3, 0)
        scene.add(flagPole)

        const flagGeo = new THREE.PlaneGeometry(2, 1.2)
        const flagColors = [
          0xff4444, 0xff8844, 0xffff44, 0x44ff44, 0x44ffff, 0x4444ff, 0xff44ff,
          0xff8888, 0x88ff88, 0xffd700,
        ]
        const flagColor = flagColors[(level - 1) % flagColors.length]
        const flagMat = new THREE.MeshStandardMaterial({
          color: flagColor,
          side: THREE.DoubleSide,
        })
        const flag = new THREE.Mesh(flagGeo, flagMat)
        flag.position.set(levelLength + 1, 5, 0)
        flag.name = 'flag'
        scene.add(flag)

        // 终点光效
        const endLight = new THREE.PointLight(flagColor, 1.5, 15)
        endLight.position.set(levelLength, 5, 0)
        scene.add(endLight)

        // 粒子效果
        createAmbientParticles()
      }

      function createTree(x, y, z) {
        // 树干
        const trunkGeo = new THREE.CylinderGeometry(0.15, 0.25, 1.5, 8)
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 })
        const trunk = new THREE.Mesh(trunkGeo, trunkMat)
        trunk.position.set(x, y + 0.75, z)
        trunk.castShadow = true
        scene.add(trunk)

        // 树冠
        const leavesGeo = new THREE.ConeGeometry(0.8, 2, 8)
        const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228b22 })
        const leaves = new THREE.Mesh(leavesGeo, leavesMat)
        leaves.position.set(x, y + 2.5, z)
        leaves.castShadow = true
        scene.add(leaves)
      }

      function createPlatform(x, y, w, h, d, color) {
        const geo = new THREE.BoxGeometry(w, h, d)
        const mat = new THREE.MeshStandardMaterial({
          color: color,
          roughness: 0.8,
        })
        const mesh = new THREE.Mesh(geo, mat)
        mesh.position.set(x, y, 0)
        mesh.castShadow = true
        mesh.receiveShadow = true
        scene.add(mesh)
        return mesh
      }

      function createEnemy(name, x, y, z) {
        const config = enemyTypes[name]
        const group = new THREE.Group()

        // 身体
        const bodyGeo = new THREE.CylinderGeometry(
          0.35 * config.scale,
          0.3 * config.scale,
          0.9 * config.scale,
          8,
        )
        const bodyMat = new THREE.MeshStandardMaterial({ color: config.color })
        const body = new THREE.Mesh(bodyGeo, bodyMat)
        body.position.y = 0.45 * config.scale
        body.castShadow = true
        group.add(body)

        // 头部
        const headGeo = new THREE.SphereGeometry(0.25 * config.scale, 12, 12)
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac })
        const head = new THREE.Mesh(headGeo, headMat)
        head.position.y = 1.0 * config.scale
        group.add(head)

        // 愤怒的眼睛
        const eyeGeo = new THREE.SphereGeometry(0.04 * config.scale, 8, 8)
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 })
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat)
        leftEye.position.set(
          -0.1 * config.scale,
          1.05 * config.scale,
          0.2 * config.scale,
        )
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat)
        rightEye.position.set(
          0.1 * config.scale,
          1.05 * config.scale,
          0.2 * config.scale,
        )
        group.add(leftEye, rightEye)

        // 武器
        if (name === '万总') {
          const weaponGeo = new THREE.BoxGeometry(0.15, 0.8, 0.15)
          const weaponMat = new THREE.MeshStandardMaterial({ color: 0x8b0000 })
          const weapon = new THREE.Mesh(weaponGeo, weaponMat)
          weapon.position.set(
            0.4 * config.scale,
            0.6 * config.scale,
            0.2 * config.scale,
          )
          group.add(weapon)
        }

        group.position.set(x, y, z)
        scene.add(group)

        // 创建标签
        const label = document.createElement('div')
        label.className = 'enemyLabel'
        label.textContent = name
        document.getElementById('ui').appendChild(label)

        return {
          mesh: group,
          name: name,
          health: config.health,
          maxHealth: config.health,
          damage: config.damage,
          speed: config.speed,
          label: label,
          lastAttack: 0,
          hitFlash: 0,
        }
      }

      function createAmbientParticles() {
        const particleGeo = new THREE.BufferGeometry()
        const particleCount = 50
        const positions = new Float32Array(particleCount * 3)

        for (let i = 0; i < particleCount * 3; i += 3) {
          positions[i] = (Math.random() - 0.5) * 100
          positions[i + 1] = Math.random() * 15 + 2
          positions[i + 2] = (Math.random() - 0.5) * 20
        }

        particleGeo.setAttribute(
          'position',
          new THREE.BufferAttribute(positions, 3),
        )

        // 蝴蝶/萤火虫效果
        const particleMat = new THREE.PointsMaterial({
          color: 0xffcc88,
          size: 0.15,
          transparent: true,
          opacity: 0.7,
          blending: THREE.AdditiveBlending,
        })

        const particleSystem = new THREE.Points(particleGeo, particleMat)
        scene.add(particleSystem)
        particles.push(particleSystem)
      }

      // ==================== 游戏逻辑 ====================
      function startGame() {
        document.getElementById('startScreen').style.display = 'none'
        gameRunning = true
        currentLevel = 1
        score = 0
        kills = 0
        weaponLevel = 1
        playerHealth = 100

        createPlayer()
        generateLevel(currentLevel)
        updateUI()
      }

      function restartGame() {
        document.getElementById('gameOverScreen').style.display = 'none'
        document.getElementById('victoryScreen').style.display = 'none'

        // 清理场景
        if (player) {
          scene.remove(player)
          player = null
        }
        enemies.forEach((e) => {
          if (e.label) e.label.remove()
        })

        startGame()
      }

      function nextLevel() {
        document.getElementById('levelCompleteScreen').style.display = 'none'
        currentLevel++
        playerHealth = Math.min(playerHealth + 40, maxHealth)

        // 重置玩家位置
        player.position.set(0, 1, 0)
        playerVelocity.set(0, 0, 0)

        generateLevel(currentLevel)
        updateUI()
        gameRunning = true
      }

      function gameOver(reason) {
        gameRunning = false
        document.getElementById('gameOverText').textContent =
          `${reason}\n最终分数: ${score} | 击杀数: ${kills}`
        document.getElementById('gameOverScreen').style.display = 'flex'
      }

      function levelComplete() {
        gameRunning = false
        const texts = [
          '',
          '恭喜通过第一关！',
          '第二关完成，继续加油！',
          '太厉害了！第三关通过！',
          '第四关完成！',
          '第五关完成！',
          '第六关完成！',
          '第七关完成！',
          '第八关完成！',
          '第九关完成！',
          '最后一关，冲啊！',
        ]
        document.getElementById('levelCompleteText').textContent =
          `${texts[currentLevel]}\n分数: ${score} | 击杀: ${kills}`
        document.getElementById('levelCompleteScreen').style.display = 'flex'
      }

      function victory() {
        gameRunning = false
        document.getElementById('victoryText').textContent =
          `🏆 恭喜翠翠完成大冒险！\n\n` +
          `最终分数: ${score}\n` +
          `总击杀数: ${kills}\n` +
          `最终武器: ${weaponConfigs[weaponLevel].name}\n\n` +
          `你就是传说中的翠翠勇士！`
        document.getElementById('victoryScreen').style.display = 'flex'
      }

      // ==================== 更新逻辑 ====================
      function updatePlayer(deltaTime) {
        if (!player) return

        const speed = 0.15
        const jumpPower = 0.35

        // 移动
        let moveX = 0
        if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1
        if (keys['ArrowRight'] || keys['KeyD']) moveX = 1

        // 应用移动
        playerVelocity.x = moveX * speed

        // 跳跃
        if ((keys['Space'] || keys['ArrowUp']) && !isJumping) {
          playerVelocity.y = jumpPower
          isJumping = true
          createJumpEffect(player.position)
        }

        // 重力
        playerVelocity.y -= 0.015

        // 应用速度
        player.position.add(playerVelocity)

        // 行走动画
        if (moveX !== 0 && !isJumping) {
          const animSpeed = 12
          player.userData.leftLeg.rotation.x =
            Math.sin(Date.now() * 0.01 * animSpeed) * 0.5
          player.userData.rightLeg.rotation.x =
            -Math.sin(Date.now() * 0.01 * animSpeed) * 0.5
          player.userData.leftArm.rotation.x =
            -Math.sin(Date.now() * 0.01 * animSpeed) * 0.3
          player.userData.rightArm.rotation.x =
            Math.sin(Date.now() * 0.01 * animSpeed) * 0.3
        } else {
          player.userData.leftLeg.rotation.x *= 0.8
          player.userData.rightLeg.rotation.x *= 0.8
          player.userData.leftArm.rotation.x *= 0.8
          player.userData.rightArm.rotation.x *= 0.8
        }

        // 转向
        if (moveX > 0) player.rotation.y = 0
        if (moveX < 0) player.rotation.y = Math.PI

        // 头部始终面向玩家（Sprite默认就会面向相机）

        // 地面碰撞检测
        let onGround = false
        for (let platform of platforms) {
          const px = platform.position.x
          const py = platform.position.y
          const pw = platform.geometry.parameters.width
          const ph = platform.geometry.parameters.height

          if (
            player.position.x > px - pw / 2 - 0.3 &&
            player.position.x < px + pw / 2 + 0.3 &&
            player.position.y > py + ph / 2 - 0.5 &&
            player.position.y < py + ph / 2 + 0.5 &&
            playerVelocity.y <= 0
          ) {
            player.position.y = py + ph / 2 + 0.6 * player.scale.y
            playerVelocity.y = 0
            isJumping = false
            onGround = true
          }
        }

        // 终点检测 - 通过旗帜位置
        const levelLength = 60 + currentLevel * 25
        if (player.position.x >= levelLength - 2) {
          if (currentLevel >= 10) {
            victory()
          } else {
            levelComplete()
          }
        }

        // 掉落检测 - 草原上不会掉死，只扣血并重置位置
        if (player.position.y < -5) {
          playerHealth -= 15
          player.position.set(Math.max(0, player.position.x - 10), 3, 0)
          playerVelocity.set(0, 0, 0)
          showDamageEffect()
          if (playerHealth <= 0) gameOver('体力耗尽...')
        }

        // 攻击冷却
        if (isAttacking) {
          const attackDuration = 300
          if (Date.now() - attackStartTime > attackDuration) {
            isAttacking = false
          }
        }

        // 剑动画 - 攻击时拖尾效果
        if (sword) {
          const baseRot = -Math.PI / 4
          if (isAttacking) {
            const progress = (Date.now() - attackStartTime) / 300
            sword.rotation.z = baseRot + Math.sin(progress * Math.PI) * 2.5
            sword.rotation.x = Math.sin(progress * Math.PI * 2) * 0.8
            // 攻击时增强发光
            sword.children.forEach((child) => {
              if (child.material && child.material.opacity !== undefined) {
                child.material.opacity = Math.min(
                  1,
                  (child.material.opacity || 0) + 0.1,
                )
              }
            })
          } else {
            sword.rotation.z += (baseRot - sword.rotation.z) * 0.2
            sword.rotation.x *= 0.8
          }
        }

        // 武器发光
        if (player.userData.glow) {
          const glow = player.userData.glow
          glow.material.color.setHex(weaponConfigs[weaponLevel].color)
          glow.material.opacity =
            0.1 + Math.sin(Date.now() * 0.005) * 0.05 * weaponLevel
        }

        // 连击计时
        if (comboTimer > 0) {
          comboTimer -= deltaTime
          if (comboTimer <= 0) comboCount = 0
        }
      }

      function updateCamera() {
        if (!player) return

        const targetPos = player.position.clone().add(cameraOffset)
        camera.position.lerp(targetPos, 0.1)
        camera.lookAt(
          player.position.x,
          player.position.y + 1,
          player.position.z,
        )
      }

      function updateEnemies(deltaTime) {
        const now = Date.now()

        enemies.forEach((enemy, index) => {
          if (enemy.health <= 0) return

          const dx = player.position.x - enemy.mesh.position.x
          const dy = player.position.y - enemy.mesh.position.y
          const dz = player.position.z - enemy.mesh.position.z
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz)

          // AI移动 - 限制在草原范围内
          if (dist > 1.5 && dist < 15) {
            enemy.mesh.position.x += (dx / dist) * enemy.speed
            enemy.mesh.position.z += (dz / dist) * enemy.speed
            // 限制z轴范围
            enemy.mesh.position.z = Math.max(
              -8,
              Math.min(8, enemy.mesh.position.z),
            )
            enemy.mesh.lookAt(
              player.position.x,
              enemy.mesh.position.y,
              player.position.z,
            )
          }

          // 攻击玩家
          if (dist < 1.5 && now - enemy.lastAttack > 1500) {
            playerHealth -= enemy.damage
            enemy.lastAttack = now
            showDamageEffect()
            createHitEffect(player.position, 0xff0000)

            // 击退
            playerVelocity.x +=
              (player.position.x - enemy.mesh.position.x) * 0.1
            playerVelocity.y = 0.15

            if (playerHealth <= 0) gameOver(`被${enemy.name}击败了...`)
          }

          // 受击闪烁
          if (enemy.hitFlash > 0) {
            enemy.hitFlash--
            enemy.mesh.children.forEach((child) => {
              if (child.material) child.material.emissive.setHex(0xff0000)
            })
          } else {
            enemy.mesh.children.forEach((child) => {
              if (child.material && child.material.emissive) {
                child.material.emissive.setHex(0)
              }
            })
          }

          // 更新标签位置
          updateEnemyLabel(enemy)
        })

        // 清理死亡敌人
        enemies = enemies.filter((enemy) => {
          if (enemy.health <= 0) {
            scene.remove(enemy.mesh)
            if (enemy.label) enemy.label.remove()

            // 升级检查
            kills++
            score += 100 * weaponLevel
            checkWeaponUpgrade()

            // 死亡特效
            createExplosion(enemy.mesh.position, enemyTypes[enemy.name].color)

            return false
          }
          return true
        })
      }

      function updateEnemyLabel(enemy) {
        if (!enemy.label) return

        const vector = enemy.mesh.position.clone()
        vector.y += 1.5
        vector.project(camera)

        const x = (vector.x * 0.5 + 0.5) * window.innerWidth
        const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight

        if (vector.z < 1) {
          enemy.label.style.left = x + 'px'
          enemy.label.style.top = y + 'px'
          enemy.label.style.display = 'block'
        } else {
          enemy.label.style.display = 'none'
        }
      }

      function updateParticles() {
        particles.forEach((p) => {
          p.rotation.y += 0.001
        })
      }

      function checkWeaponUpgrade() {
        // 10级武器：每5杀升1级
        const newLevel = Math.min(Math.floor(kills / 5) + 1, 10)
        if (newLevel > weaponLevel) {
          weaponLevel = newLevel

          // 升级特效
          createUpgradeEffect(player.position)

          // 更新剑
          player.remove(sword)
          sword = createSword(weaponLevel)
          sword.position.set(0.6, 0.8, 0.5)
          sword.rotation.z = -Math.PI / 4
          player.add(sword)

          // 恢复生命
          playerHealth = Math.min(playerHealth + 30, maxHealth)

          // 显示升级提示
          showLevelUpText(weaponLevel)
        }
      }

      function showLevelUpText(level) {
        const config = weaponConfigs[level]
        const div = document.createElement('div')
        div.style.cssText = `
          position: absolute;
          left: 50%;
          top: 35%;
          transform: translate(-50%, -50%);
          color: ${config.color === 0xffd700 ? '#ffd700' : '#fff'};
          font-size: 28px;
          font-weight: bold;
          text-shadow: 2px 2px 4px #000;
          pointer-events: none;
          animation: levelUpAnim 2s ease-out forwards;
        `
        div.textContent = `⚔️ 武器升级! ${config.name}`
        document.getElementById('ui').appendChild(div)

        setTimeout(() => div.remove(), 2000)
      }

      function createUpgradeEffect(pos) {
        // 武器升级特效 - 炫彩光环
        const colors = [
          0xff0000, 0xff8800, 0xffff00, 0x00ff00, 0x00ffff, 0x0000ff, 0xff00ff,
          0xffd700,
        ]
        colors.forEach((color, i) => {
          setTimeout(() => {
            createExplosion(pos, color, 2)
          }, i * 80)
        })

        // 中心光球
        const sphereGeo = new THREE.SphereGeometry(0.8, 16, 16)
        const sphereMat = new THREE.MeshBasicMaterial({
          color: weaponConfigs[weaponLevel].color,
          transparent: true,
          opacity: 0.9,
        })
        const sphere = new THREE.Mesh(sphereGeo, sphereMat)
        sphere.position.copy(pos)
        sphere.position.y += 1.5
        scene.add(sphere)

        // 光环
        const haloGeo = new THREE.RingGeometry(0.5, 1.5, 32)
        const haloMat = new THREE.MeshBasicMaterial({
          color: weaponConfigs[weaponLevel].color,
          transparent: true,
          opacity: 0.7,
          side: THREE.DoubleSide,
        })
        const halo = new THREE.Mesh(haloGeo, haloMat)
        halo.position.copy(pos)
        halo.position.y += 1.5
        scene.add(halo)

        let scale = 1
        const anim = () => {
          scale += 0.08
          sphere.scale.set(scale, scale, scale)
          halo.scale.set(scale * 2, scale * 2, 1)
          halo.rotation.z += 0.1
          sphere.material.opacity -= 0.02
          halo.material.opacity -= 0.02
          if (sphere.material.opacity > 0) requestAnimationFrame(anim)
          else {
            scene.remove(sphere)
            scene.remove(halo)
          }
        }
        anim()
      }

      // ==================== 攻击系统 ====================
      let attackStartTime = 0

      function attack() {
        if (!gameRunning || isAttacking || !player) return

        isAttacking = true
        attackStartTime = Date.now()

        const config = weaponConfigs[weaponLevel]
        const attackRange = config.range
        const damage = config.damage

        // 攻击特效
        createSlashEffect(player.position, player.rotation.y)

        // 检测命中
        let hitCount = 0
        enemies.forEach((enemy) => {
          if (enemy.health <= 0) return

          const dx = enemy.mesh.position.x - player.position.x
          const dz = enemy.mesh.position.z - player.position.z
          const dist = Math.sqrt(dx * dx + dz * dz)

          if (dist < attackRange) {
            // 检查方向
            const angle = Math.atan2(dz, dx)
            const playerAngle = player.rotation.y === 0 ? 0 : Math.PI
            const angleDiff = Math.abs(angle - playerAngle)

            if (angleDiff < Math.PI / 2 || angleDiff > Math.PI * 1.5) {
              enemy.health -= damage
              enemy.hitFlash = 5
              hitCount++

              // 击退
              enemy.mesh.position.x += (dx / dist) * 0.8
              enemy.mesh.position.z += (dz / dist) * 0.8

              // 特效
              createHitEffect(enemy.mesh.position, config.color)

              // 连击
              comboCount++
              comboTimer = 2000

              if (comboCount > 1) {
                score += comboCount * 10
                showComboText(comboCount)
              }
            }
          }
        })

        if (hitCount > 0) {
          score += damage * hitCount
        }

        updateUI()
      }

      // ==================== 特效系统 ====================
      function createJumpEffect(pos) {
        for (let i = 0; i < 8; i++) {
          const particle = new THREE.Mesh(
            new THREE.SphereGeometry(0.08, 6, 6),
            new THREE.MeshBasicMaterial({ color: 0x88ccff, transparent: true }),
          )
          particle.position.copy(pos)
          particle.position.y = 0.2
          particle.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.2,
            Math.random() * 0.2,
            (Math.random() - 0.5) * 0.2,
          )
          scene.add(particle)

          setTimeout(() => scene.remove(particle), 500)
        }
      }

      function createHitEffect(pos, color) {
        for (let i = 0; i < 6; i++) {
          const particle = new THREE.Mesh(
            new THREE.SphereGeometry(0.1, 6, 6),
            new THREE.MeshBasicMaterial({ color: color }),
          )
          particle.position.copy(pos)
          particle.position.x += (Math.random() - 0.5) * 0.5
          particle.position.y += (Math.random() - 0.5) * 0.5
          particle.position.z += (Math.random() - 0.5) * 0.5
          scene.add(particle)

          const anim = () => {
            particle.position.y += 0.05
            particle.scale.multiplyScalar(0.9)
            if (particle.scale.x > 0.01) requestAnimationFrame(anim)
            else scene.remove(particle)
          }
          anim()
        }
      }

      function createExplosion(pos, color, scale = 1) {
        const count = 15 * scale
        for (let i = 0; i < count; i++) {
          const particle = new THREE.Mesh(
            new THREE.SphereGeometry(0.1 * scale, 6, 6),
            new THREE.MeshBasicMaterial({ color: color }),
          )
          particle.position.copy(pos)
          const velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.5 * scale,
            (Math.random() - 0.5) * 0.5 * scale,
            (Math.random() - 0.5) * 0.5 * scale,
          )
          scene.add(particle)

          let life = 30
          const anim = () => {
            particle.position.add(velocity)
            velocity.y -= 0.01
            particle.scale.multiplyScalar(0.95)
            life--
            if (life > 0) requestAnimationFrame(anim)
            else scene.remove(particle)
          }
          anim()
        }
      }

      function createSlashEffect(pos, rotation) {
        const config = weaponConfigs[weaponLevel]
        const slashGeo = new THREE.RingGeometry(1.5, 2, 32)
        const slashMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.9,
          side: THREE.DoubleSide,
        })
        const slash = new THREE.Mesh(slashGeo, slashMat)
        slash.position.copy(pos)
        slash.position.y += 1.2
        slash.rotation.x = -Math.PI / 2
        slash.rotation.z = rotation === 0 ? -Math.PI / 2 : Math.PI / 2
        scene.add(slash)

        // 剑气冲击波
        const waveGeo = new THREE.RingGeometry(0.5, 1, 32)
        const waveMat = new THREE.MeshBasicMaterial({
          color: config.color,
          transparent: true,
          opacity: 0.7,
          side: THREE.DoubleSide,
        })
        const wave = new THREE.Mesh(waveGeo, waveMat)
        wave.position.copy(pos)
        wave.position.y += 1
        wave.rotation.x = -Math.PI / 2
        scene.add(wave)

        // 特效类型
        if (config.effect === 'fire') {
          createFireEffect(pos)
        } else if (config.effect === 'lightning') {
          createLightningEffect(pos)
        } else if (config.effect === 'ice') {
          createIceEffect(pos)
        } else if (config.effect === 'poison') {
          createPoisonEffect(pos)
        } else if (config.effect === 'crystal') {
          createCrystalEffect(pos)
        } else if (config.effect === 'star') {
          createStarEffect(pos)
        } else if (config.effect === 'dark') {
          createDarkEffect(pos)
        } else if (config.effect === 'holy') {
          createHolyEffect(pos)
        } else if (config.effect === 'rainbow') {
          createRainbowEffect(pos)
        }

        let scale = 1
        const anim = () => {
          scale += 0.4
          slash.scale.set(scale, scale, scale)
          wave.scale.set(scale * 1.5, scale * 1.5, 1)
          slash.material.opacity -= 0.04
          wave.material.opacity -= 0.05
          if (slash.material.opacity > 0) requestAnimationFrame(anim)
          else {
            scene.remove(slash)
            scene.remove(wave)
          }
        }
        anim()
      }

      function createRainbowEffect(pos) {
        const colors = [
          0xff0000, 0xff8800, 0xffff00, 0x00ff00, 0x00ffff, 0x0000ff, 0xff00ff,
        ]
        colors.forEach((color, i) => {
          const ringGeo = new THREE.RingGeometry(
            0.5 + i * 0.2,
            0.6 + i * 0.2,
            32,
          )
          const ringMat = new THREE.MeshBasicMaterial({
            color: color,
            transparent: true,
            opacity: 0.6,
            side: THREE.DoubleSide,
          })
          const ring = new THREE.Mesh(ringGeo, ringMat)
          ring.position.copy(pos)
          ring.position.y += 1
          scene.add(ring)

          let scale = 1
          const anim = () => {
            scale += 0.2
            ring.scale.set(scale, scale, scale)
            ring.material.opacity -= 0.03
            ring.rotation.z += 0.1
            if (ring.material.opacity > 0) requestAnimationFrame(anim)
            else scene.remove(ring)
          }
          setTimeout(() => anim(), i * 50)
        })
      }

      function createFireEffect(pos) {
        for (let i = 0; i < 10; i++) {
          const particle = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 6, 6),
            new THREE.MeshBasicMaterial({
              color: Math.random() > 0.5 ? 0xff4400 : 0xffaa00,
            }),
          )
          particle.position.copy(pos)
          particle.position.y += 1 + Math.random() * 0.5
          scene.add(particle)

          const anim = () => {
            particle.position.y += 0.1
            particle.position.x += (Math.random() - 0.5) * 0.3
            particle.scale.multiplyScalar(0.92)
            if (particle.scale.x > 0.01) requestAnimationFrame(anim)
            else scene.remove(particle)
          }
          anim()
        }
      }

      function createLightningEffect(pos) {
        for (let i = 0; i < 8; i++) {
          const lineGeo = new THREE.BoxGeometry(0.05, 1.5 + Math.random(), 0.05)
          const lineMat = new THREE.MeshBasicMaterial({ color: 0x00ffff })
          const line = new THREE.Mesh(lineGeo, lineMat)
          line.position.copy(pos)
          line.position.y += 1.5
          line.position.x += (Math.random() - 0.5) * 2
          line.position.z += (Math.random() - 0.5) * 2
          line.rotation.z = (Math.random() - 0.5) * 0.5
          scene.add(line)

          setTimeout(() => scene.remove(line), 200)
        }
      }

      function createIceEffect(pos) {
        for (let i = 0; i < 12; i++) {
          const crystal = new THREE.Mesh(
            new THREE.OctahedronGeometry(0.15),
            new THREE.MeshBasicMaterial({
              color: 0x88ffff,
              transparent: true,
              opacity: 0.8,
            }),
          )
          crystal.position.copy(pos)
          crystal.position.y += 1
          crystal.position.x += (Math.random() - 0.5) * 2
          crystal.position.z += (Math.random() - 0.5) * 2
          scene.add(crystal)

          const anim = () => {
            crystal.rotation.y += 0.1
            crystal.scale.multiplyScalar(0.95)
            if (crystal.scale.x > 0.01) requestAnimationFrame(anim)
            else scene.remove(crystal)
          }
          anim()
        }
      }

      function createPoisonEffect(pos) {
        for (let i = 0; i < 15; i++) {
          const bubble = new THREE.Mesh(
            new THREE.SphereGeometry(0.1, 8, 8),
            new THREE.MeshBasicMaterial({
              color: 0x00ff00,
              transparent: true,
              opacity: 0.7,
            }),
          )
          bubble.position.copy(pos)
          bubble.position.y += 0.5 + Math.random() * 1
          scene.add(bubble)

          const anim = () => {
            bubble.position.y += 0.05
            bubble.position.x += Math.sin(Date.now() * 0.01) * 0.02
            bubble.scale.multiplyScalar(0.97)
            if (bubble.scale.x > 0.01) requestAnimationFrame(anim)
            else scene.remove(bubble)
          }
          anim()
        }
      }

      function createCrystalEffect(pos) {
        for (let i = 0; i < 10; i++) {
          const crystal = new THREE.Mesh(
            new THREE.OctahedronGeometry(0.2),
            new THREE.MeshBasicMaterial({
              color: [0xff00ff, 0x00ffff, 0xffff00][i % 3],
              transparent: true,
              opacity: 0.9,
            }),
          )
          crystal.position.copy(pos)
          crystal.position.y += 1 + Math.random() * 0.5
          scene.add(crystal)

          const anim = () => {
            crystal.rotation.x += 0.1
            crystal.rotation.z += 0.15
            crystal.scale.multiplyScalar(0.96)
            if (crystal.scale.x > 0.01) requestAnimationFrame(anim)
            else scene.remove(crystal)
          }
          anim()
        }
      }

      function createStarEffect(pos) {
        for (let i = 0; i < 20; i++) {
          const star = new THREE.Mesh(
            new THREE.OctahedronGeometry(0.1),
            new THREE.MeshBasicMaterial({
              color: 0xffff00,
              transparent: true,
              opacity: 1,
            }),
          )
          star.position.copy(pos)
          star.position.y += 1.5
          scene.add(star)

          const startAngle = (i / 20) * Math.PI * 2
          const anim = () => {
            star.position.x += Math.cos(startAngle + Date.now() * 0.01) * 0.15
            star.position.z += Math.sin(startAngle + Date.now() * 0.01) * 0.15
            star.rotation.y += 0.2
            star.scale.multiplyScalar(0.96)
            if (star.scale.x > 0.01) requestAnimationFrame(anim)
            else scene.remove(star)
          }
          anim()
        }
      }

      function createDarkEffect(pos) {
        for (let i = 0; i < 8; i++) {
          const shadow = new THREE.Mesh(
            new THREE.SphereGeometry(0.3, 8, 8),
            new THREE.MeshBasicMaterial({
              color: 0x330033,
              transparent: true,
              opacity: 0.8,
            }),
          )
          shadow.position.copy(pos)
          shadow.position.y += 1
          shadow.position.x += (Math.random() - 0.5) * 3
          shadow.position.z += (Math.random() - 0.5) * 3
          scene.add(shadow)

          const anim = () => {
            shadow.scale.x *= 1.05
            shadow.scale.y *= 1.02
            shadow.material.opacity -= 0.03
            if (shadow.material.opacity > 0) requestAnimationFrame(anim)
            else scene.remove(shadow)
          }
          anim()
        }
      }

      function createHolyEffect(pos) {
        // 神圣光环
        const haloGeo = new THREE.RingGeometry(1, 2, 32)
        const haloMat = new THREE.MeshBasicMaterial({
          color: 0xffd700,
          transparent: true,
          opacity: 0.6,
          side: THREE.DoubleSide,
        })
        const halo = new THREE.Mesh(haloGeo, haloMat)
        halo.position.copy(pos)
        halo.position.y += 2
        scene.add(halo)

        // 光芒
        for (let i = 0; i < 12; i++) {
          const ray = new THREE.Mesh(
            new THREE.BoxGeometry(0.05, 1, 0.05),
            new THREE.MeshBasicMaterial({
              color: 0xffd700,
              transparent: true,
              opacity: 0.8,
            }),
          )
          ray.position.copy(pos)
          ray.position.y += 2
          const angle = (i / 12) * Math.PI * 2
          ray.position.x += Math.cos(angle) * 1.5
          ray.position.z += Math.sin(angle) * 1.5
          scene.add(ray)
        }

        let scale = 1
        const anim = () => {
          scale += 0.05
          halo.scale.set(scale, scale, scale)
          halo.rotation.y += 0.1
          halo.material.opacity -= 0.02
          if (halo.material.opacity > 0) requestAnimationFrame(anim)
          else scene.remove(halo)
        }
        anim()
      }

      function showDamageEffect() {
        const overlay = document.getElementById('damageOverlay')
        overlay.style.opacity = '1'
        setTimeout(() => (overlay.style.opacity = '0'), 200)
      }

      function showComboText(combo) {
        const div = document.createElement('div')
        div.style.cssText = `
          position: absolute;
          left: 50%;
          top: 40%;
          transform: translate(-50%, -50%);
          color: #ff0;
          font-size: 32px;
          font-weight: bold;
          text-shadow: 2px 2px 4px #f00;
          pointer-events: none;
          animation: comboAnim 1s ease-out forwards;
        `
        div.textContent = `${combo} 连击！`
        document.getElementById('ui').appendChild(div)

        setTimeout(() => div.remove(), 1000)
      }

      // ==================== UI更新 ====================
      function updateUI() {
        document.getElementById('healthFill').style.width =
          (playerHealth / maxHealth) * 100 + '%'
        document.getElementById('score').textContent = score
        document.getElementById('kills').textContent = kills

        const levelNames = [
          '',
          '草原清晨',
          '阳光明媚',
          '午后时光',
          '夕阳西下',
          '暮色降临',
          '星空夜幕',
          '午夜静谧',
          '黎明前奏',
          '破晓时分',
          '胜利曙光',
        ]
        document.getElementById('levelInfo').textContent =
          `第 ${currentLevel} 关 - ${levelNames[currentLevel]}`
        const config = weaponConfigs[weaponLevel]
        document.getElementById('weaponInfo').innerHTML =
          `${config.name} Lv.${weaponLevel}<br>伤害: ${config.damage} | ${config.effect || ''}`
      }

      // ==================== 事件处理 ====================
      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight
        camera.updateProjectionMatrix()
        renderer.setSize(window.innerWidth, window.innerHeight)
      }

      function onMouseDown(e) {
        if (e.button === 0) attack()
      }

      function onTouchStart(e) {
        if (e.target.tagName === 'CANVAS') {
          // 点击屏幕也可以攻击
          // attack();
        }
      }

      // ==================== 主循环 ====================
      function animate() {
        animationId = requestAnimationFrame(animate)

        if (gameRunning) {
          updatePlayer(16)
          updateEnemies(16)
          updateParticles()
          updateCamera()
          updateUI()
        }

        renderer.render(scene, camera)
      }

      // 启动
      init()
    </script>
  </body>
</html>
